# =====================================================================
# Nginx config — proxy split agente x sistema
# =====================================================================
# Roteia requests no container Render Pro Plus 8GB/4CPU:
#   - /agente/*  -> gunicorn-agente   :5001  (workers=1, threads=8)
#   - /static/*  -> serve direto do disco (zero proxy)
#   - resto      -> gunicorn-sistema  :5002  (workers=4, threads=2)
#
# Motivo: Claude Agent SDK e per-process. Multi-worker + sticky session
# (Anthropic Issue #61862) cria 409 quando worker dono ocupado pos-stream.
# Pattern 2 oficial da doc /hosting: "multiple Claude Agent processes
# inside of the container based on demand".
#
# Render so exige UMA porta exposta (10000). Tudo interno e 127.0.0.1.
# =====================================================================

worker_processes 1;
error_log /dev/stderr info;
pid /tmp/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # Logs para stdout (Render captura)
    access_log /dev/stdout;

    # MIME types basicos (para servir estaticos)
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 75s;
    types_hash_max_size 2048;
    server_tokens off;

    # Upload de arquivos (devolucao, agente files)
    client_max_body_size 50M;
    client_body_buffer_size 128k;

    # Compressao
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml application/json
        application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # Upstreams (keepalive reduz overhead de TCP handshake)
    upstream agente_backend {
        server 127.0.0.1:5001;
        keepalive 32;
    }

    upstream sistema_backend {
        server 127.0.0.1:5002;
        keepalive 64;
    }

    # =================================================================
    # Server publico (porta Render)
    # =================================================================
    server {
        listen 10000 default_server;
        listen [::]:10000 default_server;
        server_name _;

        # ===========================================================
        # /agente/* -> gunicorn-agente (workers=1, threads=8)
        # ===========================================================
        # IMPORTANTE: SSE em /agente/api/chat exige proxy_buffering off,
        # proxy_cache off e timeouts longos. Sem isso o nginx bufera o
        # stream e o frontend nao recebe eventos em tempo real.
        location ^~ /agente/ {
            proxy_pass http://agente_backend;

            # Headers padrao
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            # HTTP/1.1 + keepalive ao upstream
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # SSE/streaming — desliga buffer e cache
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_set_header X-Accel-Buffering no;

            # Timeouts longos (SSE chat ate ~29min)
            proxy_connect_timeout 30s;
            proxy_send_timeout 1800s;
            proxy_read_timeout 1800s;
            send_timeout 1800s;
        }

        # /agente (sem trailing slash) tambem para o agente
        location = /agente {
            proxy_pass http://agente_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ===========================================================
        # /agente-lojas/* -> gunicorn-agente (mesmo padrao per-process)
        # ===========================================================
        # 2o agente SDK (Lojas HORA Motochefe, app/agente_lojas/).
        # Compartilha o mesmo gunicorn de 1 worker — threads diferentes
        # atendem sessoes diferentes; ClaudeSDKClient e per-session.
        location ^~ /agente-lojas/ {
            proxy_pass http://agente_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # SSE/streaming — desliga buffer e cache (mesmo do /agente/)
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_set_header X-Accel-Buffering no;

            proxy_connect_timeout 30s;
            proxy_send_timeout 1800s;
            proxy_read_timeout 1800s;
            send_timeout 1800s;
        }

        location = /agente-lojas {
            proxy_pass http://agente_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ===========================================================
        # Estaticos servidos direto (sem proxy)
        # ===========================================================
        location /static/ {
            alias /opt/render/project/src/app/static/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            access_log off;

            # Fallback para o sistema se arquivo nao existir em disco
            try_files $uri @sistema_proxy;
        }

        location @sistema_proxy {
            proxy_pass http://sistema_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ===========================================================
        # Resto -> gunicorn-sistema (workers=4, threads=2)
        # ===========================================================
        location / {
            proxy_pass http://sistema_backend;

            # Headers padrao
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            # HTTP/1.1 + keepalive
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Permite SSE em outras rotas (carteira tem polling/SSE em alguns lugares)
            proxy_buffering off;
            proxy_cache off;

            # Timeouts (consistentes com gunicorn timeout=1800)
            proxy_connect_timeout 30s;
            proxy_send_timeout 1800s;
            proxy_read_timeout 1800s;
            send_timeout 1800s;
        }

        # Health check trivial (caso queira mover do Flask)
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
