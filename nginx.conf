# =====================================================================
# Nginx config — proxy split agente x sistema
# =====================================================================
# Roteia requests no container Render Pro Plus 8GB/4CPU:
#   - /agente/*       -> gunicorn-agente   :5001  (workers=1, threads=8)
#   - /agente-lojas/* -> gunicorn-agente   :5001  (mesmo agente)
#   - /static/*       -> serve direto do disco
#   - resto           -> gunicorn-sistema  :5002  (workers=4, threads=2)
#
# Motivo: Claude Agent SDK e per-process. Multi-worker + sticky session
# (Anthropic Issue #61862) cria 409 quando worker dono ocupado pos-stream.
# Pattern 2 oficial da doc /hosting: "multiple Claude Agent processes
# inside of the container based on demand".
#
# IMPORTANTE: NGINX e o unico processo que binda 0.0.0.0:10000 (porta
# que o Render exige). Gunicorns sao internos (127.0.0.1). Por isso o
# start_render.sh faz `unset GUNICORN_CMD_ARGS` antes de subir os
# gunicorns — o Render injeta GUNICORN_CMD_ARGS=--bind=0.0.0.0:$PORT
# que sobrescreveria o bind dos configs.
# =====================================================================

worker_processes 1;
error_log /dev/stderr info;
pid /tmp/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # Logs para stdout (Render captura)
    access_log /dev/stdout;

    # MIME types basicos (para servir estaticos)
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 75s;
    types_hash_max_size 2048;
    server_tokens off;

    # Upload de arquivos (devolucao, agente files)
    client_max_body_size 50M;
    client_body_buffer_size 128k;

    # Compressao
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml application/json
        application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # Upstreams (keepalive reduz overhead de TCP handshake)
    upstream agente_backend {
        server 127.0.0.1:5001;
        keepalive 32;
    }

    upstream sistema_backend {
        server 127.0.0.1:5002;
        keepalive 64;
    }

    # =================================================================
    # Server publico (porta Render)
    # =================================================================
    server {
        listen 10000 default_server;
        listen [::]:10000 default_server;
        server_name _;

        # ===========================================================
        # /agente/* -> gunicorn-agente (workers=1, threads=8)
        # ===========================================================
        # SSE em /agente/api/chat exige proxy_buffering off,
        # proxy_cache off e timeouts longos.
        location ^~ /agente/ {
            proxy_pass http://agente_backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # SSE/streaming
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_set_header X-Accel-Buffering no;

            proxy_connect_timeout 30s;
            proxy_send_timeout 1800s;
            proxy_read_timeout 1800s;
            send_timeout 1800s;
        }

        location = /agente {
            proxy_pass http://agente_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ===========================================================
        # /agente-lojas/* -> gunicorn-agente (mesmo padrao per-process)
        # ===========================================================
        location ^~ /agente-lojas/ {
            proxy_pass http://agente_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_set_header X-Accel-Buffering no;

            proxy_connect_timeout 30s;
            proxy_send_timeout 1800s;
            proxy_read_timeout 1800s;
            send_timeout 1800s;
        }

        location = /agente-lojas {
            proxy_pass http://agente_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ===========================================================
        # Estaticos servidos direto (sem proxy)
        # ===========================================================
        location /static/ {
            alias /opt/render/project/src/app/static/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            access_log off;

            # Fallback para sistema se nao existir em disco
            try_files $uri @sistema_proxy;
        }

        location @sistema_proxy {
            proxy_pass http://sistema_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ===========================================================
        # Resto -> gunicorn-sistema (workers=4, threads=2)
        # ===========================================================
        location / {
            proxy_pass http://sistema_backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # SSE em outras rotas (carteira tem polling em alguns lugares)
            proxy_buffering off;
            proxy_cache off;

            proxy_connect_timeout 30s;
            proxy_send_timeout 1800s;
            proxy_read_timeout 1800s;
            send_timeout 1800s;
        }

        # Health check trivial
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
