{% extends "base.html" %}

{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-plus-circle"></i> Nova Receita</h2>
        <a href="{{ url_for('carvia.listar_receitas') }}" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left"></i> Voltar
        </a>
    </div>

    {% set carvia_active = 'receitas' %}
    {% include 'carvia/_quick_nav.html' %}

    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body">
                    <form method="POST" action="{{ url_for('carvia.criar_receita') }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="tipo_receita" class="form-label">Tipo de Receita *</label>
                                <input type="text" class="form-control" id="tipo_receita" name="tipo_receita"
                                       maxlength="50" required placeholder="Ex: Comissao, Reembolso..."
                                       list="tipos_receita_list">
                                <datalist id="tipos_receita_list">
                                    <option value="COMISSAO">
                                    <option value="REEMBOLSO">
                                    <option value="BONIFICACAO">
                                    <option value="OUTROS">
                                    <option value="DESCONSIDERAR">
                                </datalist>
                            </div>
                            <div class="col-md-6">
                                <label for="valor" class="form-label">Valor (R$) *</label>
                                <input type="number" class="form-control" id="valor" name="valor"
                                       step="0.01" min="0.01" required placeholder="0,00">
                            </div>
                            <div class="col-12">
                                <label for="descricao" class="form-label">Descricao</label>
                                <input type="text" class="form-control" id="descricao" name="descricao"
                                       maxlength="500" placeholder="Descricao da receita">
                            </div>
                            <div class="col-md-6">
                                <label for="data_receita" class="form-label">Data da Receita *</label>
                                <input type="date" class="form-control" id="data_receita" name="data_receita" required>
                            </div>
                            <div class="col-md-6">
                                <label for="data_vencimento" class="form-label">Data de Vencimento</label>
                                <input type="date" class="form-control" id="data_vencimento" name="data_vencimento">
                            </div>
                            <div class="col-12">
                                <label for="observacoes" class="form-label">Observacoes</label>
                                <textarea class="form-control" id="observacoes" name="observacoes"
                                          rows="3" placeholder="Observacoes adicionais..."></textarea>
                            </div>
                        </div>

                        <hr>
                        <div class="d-flex justify-content-end gap-2">
                            <a href="{{ url_for('carvia.listar_receitas') }}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-save"></i> Criar Receita
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
