{% extends "base.html" %}

{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-plus-circle"></i> Nova Despesa</h2>
        <a href="{{ url_for('carvia.listar_despesas') }}" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left"></i> Voltar
        </a>
    </div>

    {% set carvia_active = 'despesas' %}
    {% include 'carvia/_quick_nav.html' %}

    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body">
                    <form method="POST" action="{{ url_for('carvia.criar_despesa') }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="tipo_despesa" class="form-label">Tipo de Despesa *</label>
                                <select class="form-select" id="tipo_despesa" name="tipo_despesa" required>
                                    <option value="">Selecione...</option>
                                    {% for tipo in tipos_despesa %}
                                    <option value="{{ tipo }}">{{ tipo }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="valor" class="form-label">Valor (R$) *</label>
                                <input type="number" class="form-control" id="valor" name="valor"
                                       step="0.01" min="0.01" required placeholder="0,00">
                            </div>
                            <div class="col-12">
                                <label for="descricao" class="form-label">Descricao</label>
                                <input type="text" class="form-control" id="descricao" name="descricao"
                                       maxlength="500" placeholder="Descricao da despesa">
                            </div>
                            <div class="col-md-6">
                                <label for="data_despesa" class="form-label">Data da Despesa *</label>
                                <input type="date" class="form-control" id="data_despesa" name="data_despesa" required>
                            </div>
                            <div class="col-md-6">
                                <label for="data_vencimento" class="form-label">Data de Vencimento</label>
                                <input type="date" class="form-control" id="data_vencimento" name="data_vencimento">
                            </div>
                            <div class="col-12">
                                <label for="observacoes" class="form-label">Observacoes</label>
                                <textarea class="form-control" id="observacoes" name="observacoes"
                                          rows="3" placeholder="Observacoes adicionais..."></textarea>
                            </div>
                        </div>

                        <hr>
                        <div class="d-flex justify-content-end gap-2">
                            <a href="{{ url_for('carvia.listar_despesas') }}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-save"></i> Criar Despesa
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
