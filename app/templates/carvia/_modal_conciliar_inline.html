{# Modal de conciliacao inline — usado na Tela 2 (Extrato Bancario) #}
<div class="modal fade" id="modalConciliarInline" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-exchange-alt"></i> Conciliar Linha</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                {# Info da linha selecionada #}
                <div id="concInlineLinha" class="alert alert-light mb-3">
                    <div class="d-flex justify-content-between">
                        <span id="concInlineDesc">-</span>
                        <strong id="concInlineValor" class="carvia-conciliacao-valor">-</strong>
                    </div>
                    <small class="text-muted">
                        <span id="concInlineData">-</span> |
                        Saldo a conciliar: <strong id="concInlineSaldo">-</strong>
                    </small>
                </div>

                {# Loading #}
                <div id="concInlineLoading" class="text-center py-3">
                    <div class="spinner-border spinner-border-sm"></div>
                    <span class="ms-2">Carregando documentos...</span>
                </div>

                {# Lista de docs elegiveis #}
                <div id="concInlineDocs" class="d-none">
                    <table class="table table-sm carvia-table">
                        <thead>
                            <tr>
                                <th style="width:30px"></th>
                                <th>Documento</th>
                                <th>Nome</th>
                                <th class="text-end">Valor</th>
                                <th class="text-end">Saldo</th>
                                <th style="width:120px">Valor Alocado</th>
                            </tr>
                        </thead>
                        <tbody id="concInlineDocsBody"></tbody>
                    </table>
                    <div id="concInlineVazio" class="text-muted text-center py-3 d-none">
                        Nenhum documento elegivel encontrado.
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-success btn-sm" id="btnConciliarInline" disabled>
                    <i class="fas fa-check"></i> Conciliar
                </button>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    let linhaAtual = null;

    window.abrirModalConciliar = function(linhaId) {
        const modal = new bootstrap.Modal(document.getElementById('modalConciliarInline'));
        const loading = document.getElementById('concInlineLoading');
        const docsDiv = document.getElementById('concInlineDocs');
        const tbody = document.getElementById('concInlineDocsBody');
        const vazio = document.getElementById('concInlineVazio');
        const btnConciliar = document.getElementById('btnConciliarInline');

        loading.classList.remove('d-none');
        docsDiv.classList.add('d-none');
        btnConciliar.disabled = true;
        tbody.innerHTML = '';

        modal.show();

        fetch(`/carvia/api/conciliacao/matches/${linhaId}`)
        .then(r => r.json())
        .then(data => {
            loading.classList.add('d-none');
            docsDiv.classList.remove('d-none');

            linhaAtual = data.linha;

            // Preencher info da linha
            document.getElementById('concInlineDesc').textContent = data.linha.descricao || '-';
            const valorFmt = parseFloat(data.linha.valor).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
            document.getElementById('concInlineValor').textContent = valorFmt;
            document.getElementById('concInlineData').textContent = data.linha.data;
            const saldoFmt = parseFloat(data.linha.saldo_a_conciliar).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
            document.getElementById('concInlineSaldo').textContent = saldoFmt;

            if (data.documentos.length === 0) {
                vazio.classList.remove('d-none');
                return;
            }
            vazio.classList.add('d-none');

            data.documentos.forEach(doc => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><input type="checkbox" class="form-check-input conc-inline-check"
                         data-tipo="${doc.tipo_documento}" data-id="${doc.id}" data-saldo="${doc.saldo}"></td>
                    <td><small>${doc.numero}</small></td>
                    <td><small>${doc.nome}</small></td>
                    <td class="text-end carvia-conciliacao-valor">
                        ${parseFloat(doc.valor_total).toLocaleString('pt-BR', {minimumFractionDigits:2})}
                    </td>
                    <td class="text-end carvia-conciliacao-valor">
                        ${parseFloat(doc.saldo).toLocaleString('pt-BR', {minimumFractionDigits:2})}
                    </td>
                    <td>
                        <input type="number" class="form-control form-control-sm conc-inline-valor"
                               step="0.01" min="0.01" max="${doc.saldo}" value="${doc.saldo}"
                               disabled style="width:100px">
                    </td>
                `;
                tbody.appendChild(tr);
            });

            // Habilitar/desabilitar inputs ao marcar checkbox
            tbody.querySelectorAll('.conc-inline-check').forEach(cb => {
                cb.addEventListener('change', () => {
                    const input = cb.closest('tr').querySelector('.conc-inline-valor');
                    input.disabled = !cb.checked;
                    btnConciliar.disabled = !tbody.querySelector('.conc-inline-check:checked');
                });
            });
        })
        .catch(err => {
            loading.classList.add('d-none');
            docsDiv.classList.remove('d-none');
            vazio.textContent = `Erro: ${err.message}`;
            vazio.classList.remove('d-none');
        });
    };

    // Btn conciliar
    document.getElementById('btnConciliarInline')?.addEventListener('click', function() {
        if (!linhaAtual) return;

        const docs = [];
        document.querySelectorAll('.conc-inline-check:checked').forEach(cb => {
            const valor = cb.closest('tr').querySelector('.conc-inline-valor').value;
            docs.push({
                tipo_documento: cb.dataset.tipo,
                documento_id: parseInt(cb.dataset.id),
                valor_alocado: parseFloat(valor),
            });
        });

        if (docs.length === 0) return;

        this.disabled = true;
        this.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';

        fetch('{{ url_for("carvia.api_conciliar") }}', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                extrato_linha_id: linhaAtual.id,
                documentos: docs,
            }),
        })
        .then(r => r.json())
        .then(data => {
            if (data.sucesso) {
                location.reload();
            } else {
                alert(data.erro || 'Erro ao conciliar');
                this.disabled = false;
                this.innerHTML = '<i class="fas fa-check"></i> Conciliar';
            }
        })
        .catch(err => {
            alert('Erro: ' + err.message);
            this.disabled = false;
            this.innerHTML = '<i class="fas fa-check"></i> Conciliar';
        });
    });
})();
</script>
