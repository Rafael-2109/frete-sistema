{% extends "base.html" %}
{% block content %}
<div class="container py-5" style="max-width:420px;">
    <div class="text-center mb-4"><h3><i class="fas fa-truck"></i> Portal do Cliente CarVia</h3>
        <p class="text-muted">Acompanhe suas notas e cote fretes.</p></div>
    <div class="card"><div class="card-body">
        <form method="POST" action="{{ url_for('portal_cliente.login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3"><label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required autofocus></div>
            <div class="mb-3"><label class="form-label">Senha</label>
                <input type="password" name="senha" class="form-control" required></div>
            <button class="btn btn-primary w-100"><i class="fas fa-sign-in-alt"></i> Entrar</button>
        </form>
        <hr>
        <div class="text-center"><a href="{{ url_for('portal_cliente.registrar') }}">Criar conta</a></div>
    </div></div>
</div>
{% endblock %}
