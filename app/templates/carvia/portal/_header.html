{# Header do Portal do Cliente CarVia (usuario externo) #}
<div class="d-flex justify-content-between align-items-center py-3 border-bottom mb-3 flex-wrap gap-2">
    <div>
        <strong><i class="fas fa-truck"></i> Portal CarVia</strong>
        <span class="text-muted">— {{ user.nome }}</span>
    </div>
    <div class="d-flex gap-2 align-items-center">
        <a href="{{ url_for('portal_cliente.dashboard') }}" class="btn btn-sm {{ 'btn-primary' if active == 'nfs' else 'btn-outline-secondary' }}"><i class="fas fa-list"></i> Minhas NFs</a>
        <a href="{{ url_for('portal_cliente.cotar') }}" class="btn btn-sm {{ 'btn-primary' if active == 'cotar' else 'btn-outline-secondary' }}"><i class="fas fa-calculator"></i> Cotar frete</a>
        <form method="POST" action="{{ url_for('portal_cliente.logout') }}" class="d-inline">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button class="btn btn-sm btn-outline-danger"><i class="fas fa-sign-out-alt"></i> Sair</button>
        </form>
    </div>
</div>
