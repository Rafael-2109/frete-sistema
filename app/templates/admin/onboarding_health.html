<script>
document.getElementById('btn-run').addEventListener('click', async function () {
  const tbody = document.querySelector('#results tbody');
  tbody.innerHTML = '';
  const status = document.getElementById('status');
  status.textContent = 'Carregando...';

  const registry = window.OnboardingEngine._registry || {};
  const tourIds = Object.keys(registry);
  let totalOk = 0, totalFail = 0;

  for (const tourId of tourIds) {
    const tour = registry[tourId];
    const route = tour.autoStartRoute || '(sem rota)';
    const renderRoute = route.replace(/\*/g, '1');

    const iframe = document.createElement('iframe');
    iframe.style.cssText = 'position:absolute;left:-9999px;width:1280px;height:800px;border:0;';
    iframe.src = renderRoute;
    document.body.appendChild(iframe);
    await new Promise(res => {
      iframe.onload = res;
      setTimeout(res, 5000);
    });

    for (let i = 0; i < tour.steps.length; i++) {
      const step = tour.steps[i];
      let found = false;
      try {
        found = !!iframe.contentDocument.querySelector(step.element);
      } catch (e) {
        found = '(?)';
      }

      const tr = tbody.insertRow();
      tr.innerHTML = '<td><code>' + tourId + '</code></td>' +
                     '<td>' + route + '</td>' +
                     '<td>' + (i + 1) + '</td>' +
                     '<td><code>' + step.element + '</code></td>' +
                     '<td>' + (found === true ? '<span class="text-success">OK</span>' : '<span class="text-danger">' + (found === false ? 'NAO' : found) + '</span>') + '</td>';
      if (found === true) totalOk++;
      else totalFail++;
    }
    iframe.remove();
  }
  status.textContent = 'Concluido. OK: ' + totalOk + ' | Falhou: ' + totalFail;
});
</script>
