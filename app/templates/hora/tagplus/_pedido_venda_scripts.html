<script>
(function() {
  // ----------------- Helpers ---------------------------------------------
  const fmtBR = (v) => {
    if (v == null || isNaN(v)) return '';
    return Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  };

  // Debounce: posterga `fn` ate `ms` apos a ultima chamada. Expoe `.flush()`
  // (executa pendente agora) e `.cancel()` (descarta pendente). Usado para
  // evitar que recalculos disparem a cada keystroke e reformatem o campo
  // enquanto o operador ainda digita (cursor pulando, calculo intermediario).
  function debounce(fn, ms) {
    let timer = null;
    let lastArgs = null;
    let lastThis = null;
    const debounced = function(...args) {
      lastArgs = args;
      lastThis = this;
      if (timer) clearTimeout(timer);
      timer = setTimeout(() => {
        timer = null;
        fn.apply(lastThis, lastArgs);
      }, ms);
    };
    debounced.flush = function() {
      if (timer) {
        clearTimeout(timer);
        timer = null;
        fn.apply(lastThis, lastArgs || []);
      }
    };
    debounced.cancel = function() {
      if (timer) { clearTimeout(timer); timer = null; }
    };
    return debounced;
  }

  const elModelo = document.getElementById('f-modelo');
  const elCor = document.getElementById('f-cor');
  const elChassi = document.getElementById('f-chassi');
  const elValor = document.getElementById('f-valor');
  const elPrecoTabela = document.getElementById('f-preco-tabela');
  const elDescontoPct = document.getElementById('f-desconto-pct');
  const elDescontoRs = document.getElementById('f-desconto-rs');
  // Pagamentos multi-formas (migration hora_34): UI repetivel substitui o
  // SELECT unico antigo. `formaRepresentativaParaPreco()` decide qual tipo
  // (A_VISTA vs A_PRAZO) usar para resolver o preco do modelo.
  const elPagContainer = document.getElementById('pagamentos-container');
  const tplPagLinha = document.getElementById('tpl-linha-pagamento');
  const elBtnAddPag = document.getElementById('btn-add-pagamento');
  const elPagSoma = document.getElementById('pag-soma');
  const elPagTotalPedido = document.getElementById('pag-total-pedido');
  const elPagAviso = document.getElementById('pag-status-aviso');
  const elPrecoInfo = document.getElementById('preco-sugerido-info');
  const elCorStatus = document.getElementById('cor-status');
  const elChassiStatus = document.getElementById('chassi-status');
  const elPrecosRef = document.getElementById('precos-ref-modelo');
  const elRefAvista = document.getElementById('ref-preco-avista');
  const elRefAprazo = document.getElementById('ref-preco-aprazo');

  // ----------------- Estado e helpers numericos --------------------------
  // precoTabela e o preço de referência (vindo do backend); atualizado quando
  // o modelo OU a forma de pagamento muda. Tudo em "Number" interno; a UI
  // formata via fmtBR.
  const state = { precoTabela: null, syncLock: false };

  // Parse formato BR ("1.234,56") OU ingles ("1234.56"); retorna Number ou NaN.
  function parseBR(s) {
    if (s == null) return NaN;
    s = String(s).trim();
    if (!s) return NaN;
    // Se tem virgula e ponto, ponto e milhar BR; remove e troca virgula.
    if (s.indexOf(',') >= 0 && s.indexOf('.') >= 0) {
      s = s.replace(/\./g, '').replace(',', '.');
    } else if (s.indexOf(',') >= 0) {
      s = s.replace(',', '.');
    }
    const n = Number(s);
    return isFinite(n) ? n : NaN;
  }

  function setBR(input, value) {
    if (input == null) return;
    if (value == null || isNaN(value)) {
      input.value = '';
      return;
    }
    input.value = fmtBR(value);
  }

  function arred2(n) {
    return Math.round(n * 100) / 100;
  }

  const elCep = document.getElementById('f-cep');
  const btnCep = document.getElementById('btn-busca-cep');
  const elCepStatus = document.getElementById('cep-status');
  const elLogradouro = document.getElementById('f-logradouro');
  const elComplemento = document.getElementById('f-complemento');
  const elBairro = document.getElementById('f-bairro');
  const elCidade = document.getElementById('f-cidade');
  const elUf = document.getElementById('f-uf');

  // ----------------- Detecção de tipo de documento (CPF/CNPJ) ---------------
  // Apenas feedback visual — não influencia mais o payload TagPlus
  // (consumidor_final agora é sempre True, ver payload_builder.py).
  const elDoc = document.getElementById('f-cpf');
  const elDocTipoInfo = document.getElementById('doc-tipo-info');

  function detectarTipoDocumento() {
    if (!elDocTipoInfo) return;
    const digitos = (elDoc.value || '').replace(/\D/g, '');
    if (digitos.length === 11) {
      elDocTipoInfo.textContent = 'CPF detectado (PF).';
      elDocTipoInfo.className = 'text-success';
    } else if (digitos.length === 14) {
      elDocTipoInfo.textContent = 'CNPJ detectado (PJ).';
      elDocTipoInfo.className = 'text-success';
    } else {
      elDocTipoInfo.textContent = 'Digite 11 dígitos para CPF ou 14 para CNPJ.';
      elDocTipoInfo.className = 'text-muted';
    }
  }

  if (elDoc) {
    elDoc.addEventListener('input', detectarTipoDocumento);
    elDoc.addEventListener('blur', detectarTipoDocumento);
  }

  // ----------------- ViaCEP ------------------------------------------------
  async function buscarCep() {
    if (!elCep || !elCepStatus) return;
    const cep = (elCep.value || '').replace(/\D/g, '');
    if (cep.length !== 8) {
      elCepStatus.textContent = 'CEP precisa ter 8 dígitos';
      elCepStatus.className = 'text-danger';
      return;
    }
    elCepStatus.textContent = 'Buscando…';
    elCepStatus.className = 'text-muted';
    try {
      const r = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
      const data = await r.json();
      if (data.erro) {
        elCepStatus.textContent = 'CEP não encontrado';
        elCepStatus.className = 'text-danger';
        return;
      }
      if (elLogradouro) elLogradouro.value = data.logradouro || '';
      if (elComplemento) elComplemento.value = data.complemento || '';
      if (elBairro) elBairro.value = data.bairro || '';
      if (elCidade) elCidade.value = data.localidade || '';
      if (elUf) elUf.value = (data.uf || '').toUpperCase();
      elCepStatus.textContent = 'OK — confira número e complemento';
      elCepStatus.className = 'text-success';
    } catch (e) {
      elCepStatus.textContent = 'Falha ao consultar ViaCEP: ' + e.message;
      elCepStatus.className = 'text-danger';
    }
  }

  if (btnCep) {
    btnCep.addEventListener('click', buscarCep);
  }
  if (elCep) {
    elCep.addEventListener('blur', () => {
      const cep = (elCep.value || '').replace(/\D/g, '');
      if (cep.length === 8) buscarCep();
    });
    // Mascara basica de CEP (00000-000) durante digitacao.
    elCep.addEventListener('input', () => {
      const v = (elCep.value || '').replace(/\D/g, '').slice(0, 8);
      elCep.value = v.length > 5 ? `${v.slice(0,5)}-${v.slice(5)}` : v;
    });
  }

  // ----------------- Cascata Modelo -> Cor -> Chassi -----------------------
  async function carregarCores() {
    if (!elModelo || !elCor || !elChassi) return;
    const modeloId = elModelo.value;
    elCor.innerHTML = '<option value="">— carregando… —</option>';
    elCor.disabled = true;
    elChassi.innerHTML = '<option value="">— escolha cor —</option>';
    elChassi.disabled = true;
    if (elValor) elValor.value = '';
    if (elPrecoInfo) elPrecoInfo.textContent = '';
    if (elCorStatus) elCorStatus.textContent = '';

    if (!modeloId) {
      elCor.innerHTML = '<option value="">— escolha o modelo primeiro —</option>';
      return;
    }
    try {
      const r = await fetch(`{{ url_for('hora.tagplus_pedido_venda_api_cores') }}?modelo_id=${encodeURIComponent(modeloId)}`);
      const data = await r.json();
      if (!data.ok || !data.cores || !data.cores.length) {
        elCor.innerHTML = '<option value="">— sem cores em estoque —</option>';
        if (elCorStatus) {
          elCorStatus.textContent = 'Nenhum chassi em estoque para este modelo.';
          elCorStatus.className = 'text-warning';
        }
        return;
      }
      elCor.innerHTML = '<option value="">— escolha a cor —</option>'
        + data.cores.map(c => `<option value="${c}">${c}</option>`).join('');
      elCor.disabled = false;
      if (elCorStatus) {
        elCorStatus.textContent = `${data.cores.length} cor(es) disponível(eis).`;
        elCorStatus.className = 'text-muted';
      }
    } catch (e) {
      elCor.innerHTML = '<option value="">— erro ao carregar —</option>';
      if (elCorStatus) {
        elCorStatus.textContent = 'Falha: ' + e.message;
        elCorStatus.className = 'text-danger';
      }
    }
  }

  async function carregarChassis() {
    if (!elModelo || !elCor || !elChassi) return;
    const modeloId = elModelo.value;
    const cor = elCor.value;
    elChassi.innerHTML = '<option value="">— carregando… —</option>';
    elChassi.disabled = true;
    if (elValor) elValor.value = '';
    if (elPrecoInfo) elPrecoInfo.textContent = '';
    if (elChassiStatus) elChassiStatus.textContent = '';

    if (!modeloId || !cor) {
      elChassi.innerHTML = '<option value="">— escolha cor —</option>';
      return;
    }
    try {
      const url = `{{ url_for('hora.tagplus_pedido_venda_api_chassis') }}?modelo_id=${encodeURIComponent(modeloId)}&cor=${encodeURIComponent(cor)}`;
      const r = await fetch(url);
      const data = await r.json();
      if (!data.ok || !data.chassis || !data.chassis.length) {
        elChassi.innerHTML = '<option value="">— sem chassis disponíveis —</option>';
        if (elChassiStatus) {
          elChassiStatus.textContent = 'Nenhum chassi disponível para esta combinação.';
          elChassiStatus.className = 'text-warning';
        }
        return;
      }
      const opts = data.chassis.map(c => {
        const flags = [];
        if (c.avarias_abertas > 0) flags.push(`⚠ ${c.avarias_abertas} avaria(s)`);
        if (c.pecas_faltando_abertas > 0) flags.push(`⚙ ${c.pecas_faltando_abertas} peça(s) faltando`);
        const sufix = flags.length ? ` [${flags.join(' / ')}]` : '';
        const loja = c.loja_nome ? ` — ${c.loja_nome}` : '';
        return `<option value="${c.chassi}">${c.chassi}${loja}${sufix}</option>`;
      }).join('');
      elChassi.innerHTML = '<option value="">— escolha o chassi —</option>' + opts;
      elChassi.disabled = false;
      if (elChassiStatus) {
        elChassiStatus.textContent = `${data.chassis.length} chassi(s) disponível(eis).`;
        elChassiStatus.className = 'text-muted';
      }
    } catch (e) {
      elChassi.innerHTML = '<option value="">— erro ao carregar —</option>';
      if (elChassiStatus) {
        elChassiStatus.textContent = 'Falha: ' + e.message;
        elChassiStatus.className = 'text-danger';
      }
    }
  }

  // ----------------- Pagamentos multi-formas -----------------------------
  // Retorna a forma "representativa" para resolver preco — se alguma a prazo,
  // pega ela; senao a primeira a vista. Espelha _classificar_formas_para_preco
  // do backend (regra: qualquer A_PRAZO -> preco a prazo).
  function formaRepresentativaParaPreco() {
    if (!elPagContainer) return '';
    const linhas = elPagContainer.querySelectorAll('.pag-linha');
    let primeiraAVista = '';
    for (const linha of linhas) {
      const sel = linha.querySelector('.pag-forma');
      if (!sel || !sel.value) continue;
      const opt = sel.options[sel.selectedIndex];
      const tipo = opt ? opt.dataset.tipo : '';
      if (tipo === 'A_PRAZO') return sel.value;
      if (tipo === 'A_VISTA' && !primeiraAVista) primeiraAVista = sel.value;
    }
    return primeiraAVista;
  }

  function atualizarSomaPagamentos() {
    if (!elPagContainer) return;
    let soma = 0;
    elPagContainer.querySelectorAll('.pag-valor').forEach(inp => {
      const v = parseBR(inp.value);
      if (!isNaN(v)) soma += v;
    });
    if (elPagSoma) elPagSoma.textContent = 'R$ ' + fmtBR(soma);
    const totalPedido = elValor ? parseBR(elValor.value) : NaN;
    if (elPagTotalPedido) elPagTotalPedido.textContent =
      isNaN(totalPedido) ? 'R$ 0,00' : 'R$ ' + fmtBR(totalPedido);
    if (elPagAviso) {
      const diff = Math.abs(soma - (isNaN(totalPedido) ? 0 : totalPedido));
      if (diff > 0.01) {
        elPagAviso.textContent = '⚠ Soma das formas difere do total — pedido salvara como INCOMPLETO.';
        elPagAviso.style.display = '';
      } else {
        elPagAviso.style.display = 'none';
      }
    }
  }

  function adicionarLinhaPagamento() {
    if (!tplPagLinha || !elPagContainer) return;
    const frag = tplPagLinha.content.cloneNode(true);
    const linha = frag.querySelector('.pag-linha');
    elPagContainer.appendChild(frag);
    // Wire handlers da linha recem-adicionada.
    const sel = linha.querySelector('.pag-forma');
    const valor = linha.querySelector('.pag-valor');
    const autWrap = linha.querySelector('.pag-aut-wrap');
    const autInput = linha.querySelector('.pag-aut');
    const btnRemover = linha.querySelector('.pag-remover');
    if (sel) sel.addEventListener('change', () => {
      const opt = sel.options[sel.selectedIndex];
      const exigeAut = opt && opt.dataset.aut === '1';
      if (autWrap) autWrap.style.display = exigeAut ? '' : 'none';
      if (autInput) autInput.required = !!exigeAut;
      atualizarPrecoTabela();
    });
    if (valor) {
      valor.addEventListener('input', atualizarSomaPagamentos);
      valor.addEventListener('blur', () => {
        const v = parseBR(valor.value);
        if (!isNaN(v)) setBR(valor, arred2(v));
      });
    }
    if (btnRemover) btnRemover.addEventListener('click', () => {
      linha.remove();
      atualizarSomaPagamentos();
      atualizarPrecoTabela();
    });
    atualizarSomaPagamentos();
  }

  if (elBtnAddPag) elBtnAddPag.addEventListener('click', adicionarLinhaPagamento);
  // Inicializa com 1 linha vazia.
  if (elPagContainer && elPagContainer.children.length === 0) {
    adicionarLinhaPagamento();
  }

  // ----------------- Refs A_VISTA / A_PRAZO (informativo) ----------------
  async function atualizarPrecosRef() {
    if (!elPrecosRef || !elModelo) return;
    const modeloId = elModelo.value;
    if (!modeloId) {
      elPrecosRef.style.display = 'none';
      return;
    }
    try {
      const r = await fetch(
        `{{ url_for('hora.tagplus_pedido_venda_api_preco_modelo') }}?modelo_id=${modeloId}`
      );
      const data = await r.json();
      if (!data.ok) { elPrecosRef.style.display = 'none'; return; }
      const av = data.preco_a_vista;
      const ap = data.preco_a_prazo;
      if (av == null && ap == null) {
        elPrecosRef.style.display = 'none';
        return;
      }
      if (elRefAvista) elRefAvista.textContent = av != null ? `R$ ${fmtBR(av)}` : '—';
      if (elRefAprazo) elRefAprazo.textContent = ap != null ? `R$ ${fmtBR(ap)}` : '—';
      elPrecosRef.style.display = '';
    } catch (e) {
      elPrecosRef.style.display = 'none';
    }
  }

  // ----------------- Preço (modelo + forma) -> auto preenche -------------
  async function atualizarPrecoTabela() {
    if (!elModelo) return;
    const modeloId = elModelo.value;
    if (!modeloId) {
      state.precoTabela = null;
      if (elPrecoTabela) elPrecoTabela.value = '';
      if (elPrecoInfo) {
        elPrecoInfo.textContent = 'Escolha o modelo e a forma de pagamento.';
        elPrecoInfo.className = 'text-muted';
      }
      recalcular('pct');
      return;
    }
    const forma = formaRepresentativaParaPreco();
    const params = new URLSearchParams({ modelo_id: modeloId });
    if (forma) params.set('forma_pagamento', forma);

    if (elPrecoInfo) {
      elPrecoInfo.textContent = 'Buscando preço…';
      elPrecoInfo.className = 'text-muted';
    }
    try {
      const r = await fetch(`{{ url_for('hora.tagplus_pedido_venda_api_preco_modelo') }}?${params}`);
      const data = await r.json();
      if (!data.ok) {
        state.precoTabela = null;
        if (elPrecoTabela) elPrecoTabela.value = '';
        if (elPrecoInfo) {
          elPrecoInfo.textContent = 'Erro: ' + (data.error || 'desconhecido');
          elPrecoInfo.className = 'text-danger';
        }
        return;
      }
      if (data.preco == null) {
        state.precoTabela = null;
        if (elPrecoTabela) elPrecoTabela.value = '';
        // Mostra o que foi tentado (informativo).
        let msg = 'Modelo sem preço cadastrado.';
        if (data.preco_a_vista != null) msg += ` (à vista: R$ ${fmtBR(data.preco_a_vista)})`;
        if (data.preco_a_prazo != null) msg += ` (a prazo: R$ ${fmtBR(data.preco_a_prazo)})`;
        if (elPrecoInfo) {
          elPrecoInfo.textContent = msg;
          elPrecoInfo.className = 'text-warning';
        }
      } else {
        state.precoTabela = arred2(Number(data.preco));
        setBR(elPrecoTabela, state.precoTabela);
        const tipoLabel = data.tipo_pagamento === 'A_VISTA'
          ? 'à vista'
          : (data.tipo_pagamento === 'A_PRAZO' ? 'a prazo' : 'forma sem classificação — usando preço à vista');
        const fonteLabel = data.fonte === 'TABELA_LEGADA'
          ? ' (de tabela legada com vigência)'
          : '';
        if (elPrecoInfo) {
          elPrecoInfo.textContent = `Preço de tabela ${tipoLabel}${fonteLabel}.`;
          elPrecoInfo.className = 'text-muted';
        }
      }
    } catch (e) {
      state.precoTabela = null;
      if (elPrecoTabela) elPrecoTabela.value = '';
      if (elPrecoInfo) {
        elPrecoInfo.textContent = 'Falha ao buscar preço: ' + e.message;
        elPrecoInfo.className = 'text-danger';
      }
    }
    // Recalcula preservando o VALOR FINAL ja digitado (ancora 'valor') para
    // nao introduzir drift de centavos ao re-buscar o preco de tabela (ex.: ao
    // trocar a forma de pagamento entre a vista/a prazo). Na 1a carga, quando o
    // valor ainda esta vazio/zero, inicializa pelo preco cheio via 'pct' (desconto 0).
    const valorAtual = elValor ? parseBR(elValor.value) : NaN;
    if (isNaN(valorAtual) || valorAtual <= 0) {
      recalcular('pct');
    } else {
      recalcular('valor');
    }
  }

  // ----------------- Sincronizacao desconto % <-> R$ <-> valor -----------
  // origem: 'pct' | 'rs' | 'valor' — qual campo o operador acabou de mexer.
  function recalcular(origem) {
    if (state.syncLock) return;
    state.syncLock = true;
    try {
      const preco = state.precoTabela;
      if (preco == null || preco <= 0) {
        // Sem preço de tabela: mantem o que o operador digitou.
        if (origem === 'rs') {
          const rs = elDescontoRs ? parseBR(elDescontoRs.value) : NaN;
          if (!isNaN(rs)) setBR(elDescontoRs, arred2(rs));
        } else if (origem === 'pct') {
          // Sem preço, % nao tem como virar R$. Deixa zerado.
          const pct = elDescontoPct ? parseBR(elDescontoPct.value) : NaN;
          if (isNaN(pct)) setBR(elDescontoPct, 0);
        }
        return;
      }

      let pct = elDescontoPct ? parseBR(elDescontoPct.value) : NaN;
      let rs = elDescontoRs ? parseBR(elDescontoRs.value) : NaN;
      let valor = elValor ? parseBR(elValor.value) : NaN;

      if (origem === 'pct') {
        if (isNaN(pct)) pct = 0;
        pct = Math.max(0, Math.min(100, pct));
        rs = arred2(preco * pct / 100);
        valor = arred2(preco - rs);
        setBR(elDescontoPct, arred2(pct));
        setBR(elDescontoRs, rs);
        setBR(elValor, valor);
      } else if (origem === 'rs') {
        if (isNaN(rs)) rs = 0;
        rs = Math.max(0, Math.min(preco, rs));
        pct = preco > 0 ? arred2(rs / preco * 100) : 0;
        valor = arred2(preco - rs);
        setBR(elDescontoRs, arred2(rs));
        setBR(elDescontoPct, pct);
        setBR(elValor, valor);
      } else if (origem === 'valor') {
        // Operador edita o valor final manualmente — recalcula desconto.
        if (isNaN(valor)) valor = preco;
        valor = Math.max(0, Math.min(preco, valor));
        rs = arred2(preco - valor);
        pct = preco > 0 ? arred2(rs / preco * 100) : 0;
        setBR(elValor, valor);
        setBR(elDescontoRs, rs);
        setBR(elDescontoPct, pct);
      }
    } finally {
      state.syncLock = false;
    }
    // Notifica painel de pagamentos sobre mudanca em valor final.
    atualizarSomaPagamentos();
  }

  if (elModelo) {
    elModelo.addEventListener('change', () => {
      carregarCores();
      atualizarPrecoTabela();
      atualizarPrecosRef();
    });
  }
  if (elCor) {
    elCor.addEventListener('change', carregarChassis);
  }

  // Debounce de 1500ms: evita que `recalcular()` reformate os outros campos
  // (via setBR) a cada keystroke — operador via cursor pulando e desconto
  // sendo recalculado em valores intermediarios (ex: digitando "1500" o
  // sistema calculava em 1, 15, 150, 1500). O evento `change` (Tab/blur/Enter)
  // dispara IMEDIATO e cancela o debounce pendente, garantindo que ao sair
  // do campo o calculo esta atualizado mesmo se o operador clicar Salvar
  // antes dos 1.5s expirarem.
  const RECALC_DEBOUNCE_MS = 1500;
  const recalcPctDeb = debounce(() => recalcular('pct'), RECALC_DEBOUNCE_MS);
  const recalcRsDeb = debounce(() => recalcular('rs'), RECALC_DEBOUNCE_MS);
  const recalcValorDeb = debounce(() => {
    recalcular('valor');
    atualizarSomaPagamentos();
    atualizarAlertaFrete();
  }, RECALC_DEBOUNCE_MS);

  if (elDescontoPct) {
    elDescontoPct.addEventListener('input', recalcPctDeb);
    elDescontoPct.addEventListener('change', () => { recalcPctDeb.cancel(); recalcular('pct'); });
  }

  if (elDescontoRs) {
    elDescontoRs.addEventListener('input', recalcRsDeb);
    elDescontoRs.addEventListener('change', () => { recalcRsDeb.cancel(); recalcular('rs'); });
  }

  if (elValor) {
    elValor.addEventListener('input', recalcValorDeb);
    elValor.addEventListener('change', () => {
      recalcValorDeb.cancel();
      recalcular('valor');
      atualizarSomaPagamentos();
      atualizarAlertaFrete();
    });
  }

  // ----------------- Frete CIF (hora_38) ---------------------------------
  // Mostra/esconde bloco de frete quando modalidade muda. INCLUSO compara
  // (valor moto - frete) com preco de tabela; ADICIONAR mostra rateio
  // (1 moto neste form, mas helper deixa pronto para multi-item no detalhe).
  const elModFrete = document.getElementById('f-modalidade-frete');
  const elBlocoFrete = document.getElementById('bloco-frete-cif');
  const elValorFrete = document.getElementById('f-valor-frete');
  const elTipoFrete = document.getElementById('f-tipo-frete-calc');
  const elAlertaFrete = document.getElementById('alerta-frete');

  function atualizarVisibilidadeBlocoFrete() {
    if (!elBlocoFrete) return;
    const cif = elModFrete && elModFrete.value === '0';
    elBlocoFrete.style.display = cif ? '' : 'none';
    if (!cif) {
      // Limpa para nao enviar dado inutil ao backend (que ja descarta).
      if (elValorFrete) elValorFrete.value = '';
      if (elTipoFrete) elTipoFrete.value = '';
      if (elAlertaFrete) elAlertaFrete.style.display = 'none';
    } else {
      atualizarAlertaFrete();
    }
  }

  function atualizarAlertaFrete() {
    if (!elAlertaFrete) return;
    if (!elModFrete || elModFrete.value !== '0') {
      elAlertaFrete.style.display = 'none';
      return;
    }
    const tipo = (elTipoFrete && elTipoFrete.value || '').trim();
    const valorFrete = parseBR(elValorFrete && elValorFrete.value);
    const valorMoto = parseBR(elValor && elValor.value);
    if (!tipo || isNaN(valorFrete) || valorFrete <= 0 || isNaN(valorMoto) || valorMoto <= 0) {
      elAlertaFrete.style.display = 'none';
      return;
    }
    const tabela = state.precoTabela;
    if (tipo === 'INCLUSO') {
      const base = arred2(valorMoto - valorFrete);
      let html = `<strong>Moto R$ ${fmtBR(valorMoto)}</strong> − Frete R$ ${fmtBR(valorFrete)} `
               + `= <strong>R$ ${fmtBR(base)}</strong> (preço base sem frete).`;
      if (tabela != null && tabela > 0 && base < tabela) {
        const diff = arred2(tabela - base);
        html += `<br><span class="text-danger">⚠ Abaixo R$ ${fmtBR(diff)} `
              + `da tabela R$ ${fmtBR(tabela)}.</span>`;
        elAlertaFrete.classList.remove('alert-info');
        elAlertaFrete.classList.add('alert-warning');
      } else {
        elAlertaFrete.classList.remove('alert-warning');
        elAlertaFrete.classList.add('alert-info');
      }
      elAlertaFrete.innerHTML = html;
    } else if (tipo === 'ADICIONAR') {
      // Form atual cria 1 moto por pedido — rateio = frete inteiro nesta moto.
      // (O detalhe ja cuida do rateio multi-item.)
      const total = arred2(valorMoto + valorFrete);
      elAlertaFrete.classList.remove('alert-warning');
      elAlertaFrete.classList.add('alert-info');
      elAlertaFrete.innerHTML =
        `<strong>VALOR A SER FATURADO COM FRETE:</strong><br>`
      + `Moto R$ ${fmtBR(valorMoto)} + R$ ${fmtBR(valorFrete)} (frete) `
      + `= <strong>R$ ${fmtBR(total)}</strong>.`;
    }
    elAlertaFrete.style.display = '';
  }

  if (elModFrete) elModFrete.addEventListener('change', atualizarVisibilidadeBlocoFrete);
  if (elValorFrete) elValorFrete.addEventListener('input', atualizarAlertaFrete);
  if (elTipoFrete) elTipoFrete.addEventListener('change', atualizarAlertaFrete);
  // Estado inicial.
  atualizarVisibilidadeBlocoFrete();

  // ----------------- Validacao no submit -----------------------------------
  const elFormPedido = document.getElementById('form-pedido-venda');
  if (elFormPedido) {
    elFormPedido.addEventListener('submit', (e) => {
      // Garante que qualquer recalculo pendente (debounce 1.5s) foi aplicado
      // antes de validar, caso o operador clique Salvar logo apos digitar.
      recalcPctDeb.flush();
      recalcRsDeb.flush();
      recalcValorDeb.flush();

      // Aceita CPF (11) ou CNPJ (14). Backend normaliza para apenas digitos
      // (venda_service._normalizar_documento) e grava em String(14). UI deixa
      // o operador digitar com mascara "00.000.000/0000-00".
      const doc = (document.getElementById('f-cpf').value || '').replace(/\D/g, '');
      if (doc.length !== 11 && doc.length !== 14) {
        e.preventDefault();
        alert('Documento deve ter 11 dígitos (CPF) ou 14 dígitos (CNPJ).');
        return;
      }
      const cep = elCep ? (elCep.value || '').replace(/\D/g, '') : '';
      if (cep.length !== 8) {
        e.preventDefault();
        alert('CEP deve ter 8 dígitos.');
        return;
      }
      const valor = elValor ? (elValor.value || '').replace(/\./g, '').replace(',', '.') : '';
      if (!valor || isNaN(Number(valor)) || Number(valor) <= 0) {
        e.preventDefault();
        alert('Valor deve ser maior que zero.');
        return;
      }
    });
  }

})();
</script>
