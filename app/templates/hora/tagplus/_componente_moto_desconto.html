      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Modelo <span class="text-danger">*</span></label>
          <select name="modelo_id" id="f-modelo" class="form-select" required>
            <option value="">— escolha o modelo —</option>
            {% for m in modelos %}
              <option value="{{ m.id }}">{{ m.nome_modelo }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Cor <span class="text-danger">*</span></label>
          <select name="cor_select" id="f-cor" class="form-select" required disabled>
            <option value="">— escolha o modelo primeiro —</option>
          </select>
          <small class="text-muted" id="cor-status"></small>
        </div>
        <div class="col-md-4">
          <label class="form-label">Chassi <span class="text-danger">*</span></label>
          <select name="chassi" id="f-chassi" class="form-select chassi-mono" required disabled>
            <option value="">— escolha cor —</option>
          </select>
          <small class="text-muted" id="chassi-status"></small>
        </div>
      </div>

      <hr class="my-3">

      <!-- Preços de referência do modelo (leve, informativo): -->
      <div id="precos-ref-modelo" class="text-muted small mb-2"
           style="display:none;">
        <i class="fas fa-tag"></i>
        <span>Tabela:</span>
        <span class="ms-2">À vista: <strong id="ref-preco-avista">—</strong></span>
        <span class="ms-3">A prazo: <strong id="ref-preco-aprazo">—</strong></span>
      </div>

      <div class="row g-3 align-items-start">
        <div class="col-md-3">
          <label class="form-label">
            Preço de tabela (R$)
            <i class="fas fa-info-circle text-muted ms-1"
               title="Definido em Cadastros → Modelos. Trazido automaticamente conforme o tipo da forma de pagamento (À vista vs A prazo)."></i>
          </label>
          <input type="text" id="f-preco-tabela" class="form-control" readonly
                 placeholder="—" tabindex="-1">
          <small class="text-muted" id="preco-sugerido-info">Escolha o modelo e a forma de pagamento.</small>
        </div>
        <div class="col-md-2">
          <label class="form-label">Desconto (%)</label>
          <input type="text" name="desconto_percentual" id="f-desconto-pct"
                 class="form-control" inputmode="decimal" placeholder="0,00" value="0,00">
        </div>
        <div class="col-md-3">
          <label class="form-label">Desconto (R$)</label>
          <input type="text" id="f-desconto-rs"
                 class="form-control" inputmode="decimal" placeholder="0,00" value="0,00">
          <small class="text-muted">Preencha % ou R$ — o outro e calculado automaticamente.</small>
        </div>
        <div class="col-md-4">
          <label class="form-label">
            <strong>Valor final (R$)</strong> <span class="text-danger">*</span>
          </label>
          <input type="text" name="valor" id="f-valor"
                 class="form-control fw-bold" required inputmode="decimal" placeholder="0,00">
          <small class="text-muted">Preço de tabela menos desconto. Editavel.</small>
        </div>
      </div>
