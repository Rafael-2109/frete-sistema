{% extends "hora/base.html" %}

{% block hora_content %}
<div class="card mt-4 mx-auto" style="max-width: 640px;">
  <div class="card-body text-center">
    {% if ok %}
      <i class="fas fa-check-circle text-success" style="font-size: 3rem;"></i>
      <h3 class="mt-3">Autorização concluída</h3>
    {% else %}
      <i class="fas fa-times-circle text-danger" style="font-size: 3rem;"></i>
      <h3 class="mt-3">Falha na autorização</h3>
    {% endif %}
    <p class="text-muted mt-2">{{ mensagem }}</p>
    <a href="{{ url_for('hora.tagplus_conta') }}" class="btn btn-primary mt-3">
      <i class="fas fa-arrow-left"></i> Voltar para configuração
    </a>
  </div>
</div>
{% endblock %}
