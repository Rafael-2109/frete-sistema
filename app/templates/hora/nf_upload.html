{% extends "hora/base.html" %}

{% block hora_content %}
<h2 class="mb-3">Importar DANFE (PDF)</h2>

<form method="post" enctype="multipart/form-data" class="card p-3" style="max-width: 700px;">
  <div class="mb-3">
    <label class="form-label">Arquivo DANFE (PDF) <span class="text-danger">*</span></label>
    <input type="file" name="pdf" accept="application/pdf" class="form-control" required>
    <div class="form-text">
      Parser reusado do CarVia: regex → Haiku (LLM) → Sonnet. Extrai chave, chassis, modelo e cor.
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label">Vincular a pedido (opcional)</label>
    <select name="pedido_id" class="form-select">
      <option value="">— Não vincular agora —</option>
      {% for p in pedidos %}
        <option value="{{ p.id }}">
          {{ p.numero_pedido }} — {{ p.data_pedido.strftime('%d/%m/%Y') }} ({{ p.itens|length }} chassis)
        </option>
      {% endfor %}
    </select>
  </div>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">Importar</button>
    <a href="{{ url_for('hora.nfs_lista') }}" class="btn btn-secondary">Cancelar</a>
  </div>
</form>
{% endblock %}
