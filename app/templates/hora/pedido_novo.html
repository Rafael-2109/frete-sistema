{% extends "hora/base.html" %}

{% block hora_content %}
<h2 class="mb-3">Novo Pedido</h2>

<form method="post" id="form-pedido" class="card p-3">
  <div class="row">
    <div class="col-md-4 mb-3">
      <label class="form-label">Número do pedido <span class="text-danger">*</span></label>
      <input type="text" name="numero_pedido" class="form-control" required>
    </div>
    <div class="col-md-4 mb-3">
      <label class="form-label">CNPJ destino <span class="text-danger">*</span></label>
      <input type="text" name="cnpj_destino" class="form-control" required
             placeholder="14 dígitos">
    </div>
    <div class="col-md-4 mb-3">
      <label class="form-label">Data do pedido <span class="text-danger">*</span></label>
      <input type="date" name="data_pedido" class="form-control" required value="{{ hoje }}">
    </div>
  </div>

  <h5>Itens</h5>
  <div class="table-responsive">
    <table class="table table-sm" id="tabela-itens">
      <thead><tr>
        <th style="min-width: 180px;">Chassi *</th>
        <th>Modelo</th>
        <th>Cor</th>
        <th style="width: 150px;">Preço compra (R$) *</th>
        <th style="width: 60px;"></th>
      </tr></thead>
      <tbody id="itens-body">
        <tr>
          <td><input type="text" name="chassis[]" class="form-control form-control-sm chassi-mono" required></td>
          <td><input type="text" name="modelos[]" class="form-control form-control-sm"></td>
          <td><input type="text" name="cores[]" class="form-control form-control-sm"></td>
          <td><input type="text" name="precos[]" class="form-control form-control-sm" required placeholder="0,00"></td>
          <td><button type="button" class="btn btn-sm btn-danger btn-remove">×</button></td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="mb-3">
    <button type="button" id="btn-adicionar-item" class="btn btn-sm btn-outline-primary">
      <i class="fas fa-plus"></i> Adicionar chassi
    </button>
  </div>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">Salvar pedido</button>
    <a href="{{ url_for('hora.pedidos_lista') }}" class="btn btn-secondary">Cancelar</a>
  </div>
</form>

<script>
(function() {
  const btnAdd = document.getElementById('btn-adicionar-item');
  const tbody = document.getElementById('itens-body');

  btnAdd.addEventListener('click', function() {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="text" name="chassis[]" class="form-control form-control-sm chassi-mono" required></td>
      <td><input type="text" name="modelos[]" class="form-control form-control-sm"></td>
      <td><input type="text" name="cores[]" class="form-control form-control-sm"></td>
      <td><input type="text" name="precos[]" class="form-control form-control-sm" required placeholder="0,00"></td>
      <td><button type="button" class="btn btn-sm btn-danger btn-remove">×</button></td>
    `;
    tbody.appendChild(tr);
  });

  tbody.addEventListener('click', function(e) {
    if (e.target.classList.contains('btn-remove')) {
      const rows = tbody.querySelectorAll('tr');
      if (rows.length > 1) e.target.closest('tr').remove();
    }
  });
})();
</script>
{% endblock %}
