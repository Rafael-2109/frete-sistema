{% extends "hora/base.html" %}

{% block hora_content %}
<h2 class="mb-3">Nova peça faltando</h2>

<form method="post" class="card p-3" style="max-width: 700px;">
  <div class="mb-3">
    <label class="form-label">Chassi <span class="text-danger">*</span></label>
    <input type="text" name="numero_chassi" class="form-control chassi-mono" required maxlength="30">
  </div>
  <div class="mb-3">
    <label class="form-label">Descrição da peça <span class="text-danger">*</span></label>
    <input type="text" name="descricao" class="form-control" required maxlength="255"
           placeholder="ex.: bateria 72V, retrovisor esquerdo, chave de ignição">
  </div>
  <div class="mb-3">
    <label class="form-label">Observações</label>
    <textarea name="observacoes" class="form-control" rows="3"></textarea>
  </div>
  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">Registrar pendência</button>
    <a href="{{ url_for('hora.pecas_lista') }}" class="btn btn-secondary">Cancelar</a>
  </div>
  <div class="form-text mt-2">
    Após registrar, você poderá adicionar fotos e/ou marcar canibalização.
  </div>
</form>
{% endblock %}
