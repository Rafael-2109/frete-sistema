{% extends "hora/base.html" %}

{% block hora_content %}
<h2 class="mb-3">Nova Loja</h2>

<form method="post" class="card p-3" style="max-width: 700px;">
  <div class="mb-3">
    <label class="form-label">CNPJ <span class="text-danger">*</span></label>
    <input type="text" name="cnpj" class="form-control" required
           placeholder="somente números ou com pontuação">
  </div>
  <div class="mb-3">
    <label class="form-label">Nome <span class="text-danger">*</span></label>
    <input type="text" name="nome" class="form-control" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Endereço</label>
    <input type="text" name="endereco" class="form-control">
  </div>
  <div class="row">
    <div class="col-md-8 mb-3">
      <label class="form-label">Cidade</label>
      <input type="text" name="cidade" class="form-control">
    </div>
    <div class="col-md-4 mb-3">
      <label class="form-label">UF</label>
      <input type="text" name="uf" class="form-control" maxlength="2" style="text-transform: uppercase;">
    </div>
  </div>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">Salvar</button>
    <a href="{{ url_for('hora.lojas_lista') }}" class="btn btn-secondary">Cancelar</a>
  </div>
</form>
{% endblock %}
