{% extends "hora/base.html" %}

{% block hora_content %}
<h2 class="mb-3">Novo Recebimento</h2>

<form method="post" class="card p-3" style="max-width: 700px;" id="form-novo-recebimento" novalidate>
  <div class="mb-3">
    <label class="form-label" for="campo-loja-destino">
      Loja receptora <span class="text-danger">*</span>
    </label>
    <select id="campo-loja-destino" name="loja_id" class="form-select" required>
      <option value="">— Selecione —</option>
      {% for l in lojas %}
        <option value="{{ l.id }}">
          {{ l.rotulo_display }}{% if l.cidade %} — {{ l.cidade }}{% if l.uf %}/{{ l.uf }}{% endif %}{% endif %}
        </option>
      {% endfor %}
    </select>
  </div>

  <div class="d-flex gap-2">
    <button id="btn-iniciar-recebimento" type="submit" class="btn btn-primary">Iniciar recebimento</button>
    <a href="{{ url_for('hora.recebimentos_lista') }}" class="btn btn-secondary">Cancelar</a>
  </div>
</form>

{% endblock %}
