<div class="modal fade" id="modal-cce" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-info text-white">
        <h5 class="modal-title">
          <i class="fas fa-edit"></i> Aplicar CCe (Carta de Correção)
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="alert alert-info">
          <strong>Placeholder Plano 4:</strong> implementação completa de CCe (substituição de chassis na NF)
          virá no próximo plano. Por enquanto, marca a divergência como resolvida.
        </div>
        <input type="hidden" id="cce-div-id" />
        <input type="hidden" id="cce-nf-id" />
        <div class="mb-3">
          <label class="form-label">Número da CCe (para auditoria)</label>
          <input type="text" class="form-control" id="cce-numero" placeholder="ex: 1" />
        </div>
        <div class="mb-3">
          <label class="form-label">Observação</label>
          <textarea class="form-control" id="cce-observacao" rows="2"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Voltar</button>
        <button type="button" class="btn btn-info" id="btn-confirmar-cce">
          <i class="fas fa-check"></i> Marcar Resolvida
        </button>
      </div>
    </div>
  </div>
</div>
