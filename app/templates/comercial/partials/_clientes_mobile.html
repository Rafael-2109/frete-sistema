{#
  PARTIAL: Lista de Clientes Mobile (Cards)
  Visível apenas em mobile (<768px)
#}

<!-- Botão Flutuante de Filtros (Mobile) -->
<button id="filtrosMobileButton" style="display: none;">
    <i class="fas fa-filter"></i>
    <span class="badge-filtros-ativos" id="badgeFiltrosAtivos" style="display: none;">0</span>
</button>

<!-- Metadados para o JS mobile (paginacao server-side) -->
<div id="paginacaoMobileMeta"
     data-page="{{ page if page is defined else 1 }}"
     data-per-page="{{ per_page if per_page is defined else 50 }}"
     data-total-pages="{{ total_pages if total_pages is defined else 1 }}"
     data-total="{{ total_clientes if total_clientes is defined else 0 }}"
     style="display: none;"></div>

<!-- Container de Cards Mobile -->
<div id="clientesListaMobile" style="display: none;">
    <!-- Cards serão inseridos aqui via JavaScript -->
    <div class="cliente-card-mobile-loading">
        <i class="fas fa-spinner fa-spin"></i>
        <p>Carregando clientes...</p>
    </div>
</div>

<!-- Botão Carregar Mais será inserido via JS -->
