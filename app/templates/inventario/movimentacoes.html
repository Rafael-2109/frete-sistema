{% extends "base.html" %}
{% block title %}Inventário — Movimentações Odoo{% endblock %}
{% block content %}
<div class="container-fluid py-3">
  <h3 class="mb-3">
    Movimentações Odoo
    {% if filtros.cod %}<small class="text-muted">— produto: {{ filtros.cod }}</small>{% endif %}
  </h3>
  <form id="form-filtros" class="row g-2 mb-3">
    <div class="col-2"><input class="form-control form-control-sm" name="cod" value="{{ filtros.cod or '' }}" placeholder="Código"></div>
    <div class="col-2">
      <select class="form-select form-select-sm" name="empresa">
        <option value="">Todas empresas</option>
        <option value="FB" {% if filtros.empresa=='FB' %}selected{% endif %}>FB</option>
        <option value="CD" {% if filtros.empresa=='CD' %}selected{% endif %}>CD</option>
        <option value="LF" {% if filtros.empresa=='LF' %}selected{% endif %}>LF</option>
      </select>
    </div>
    <div class="col-2">
      <select class="form-select form-select-sm" name="tipo">
        <option value="">Todos tipos</option>
        <option value="ESTOQUE" {% if filtros.tipo=='ESTOQUE' %}selected{% endif %}>Estoque</option>
        <option value="PRODUCAO" {% if filtros.tipo=='PRODUCAO' %}selected{% endif %}>Produção</option>
      </select>
    </div>
    <div class="col-2"><input class="form-control form-control-sm" type="date" name="data_inicio" value="{{ filtros.data_inicio or '2026-05-16' }}"></div>
    <div class="col-2"><input class="form-control form-control-sm" type="date" name="data_fim" value="{{ filtros.data_fim or '' }}"></div>
    <div class="col-2"><input class="form-control form-control-sm" name="usuario" value="{{ filtros.usuario or '' }}" placeholder="Usuário"></div>
    <div class="col-2"><input class="form-control form-control-sm" name="origem" value="{{ filtros.origem or '' }}" placeholder="Origem"></div>
    <div class="col-2"><input class="form-control form-control-sm" name="destino" value="{{ filtros.destino or '' }}" placeholder="Destino"></div>
    <div class="col-2">
      <select class="form-select form-select-sm" name="page_size">
        <option value="100" {% if filtros.page_size==100 %}selected{% endif %}>100</option>
        <option value="500" {% if filtros.page_size==500 %}selected{% endif %}>500</option>
        <option value="1000" {% if filtros.page_size==1000 %}selected{% endif %}>1000</option>
      </select>
    </div>
    <input type="hidden" name="page" value="1">
    <div class="col-2"><button type="submit" class="btn btn-sm btn-primary w-100">Aplicar</button></div>
    <div class="col-2"><a id="btn-export" href="#" class="btn btn-sm btn-success w-100">Exportar XLSX</a></div>
  </form>
  <div id="resumo" class="mb-2 small text-muted"></div>
  <div id="tabela" class="table-responsive">Carregando...</div>
  <nav class="mt-3"><div id="paginador" class="d-flex gap-2"></div></nav>

<script>
let CURRENT_PAGE = 1;

function paramsObj() {
  const fd = new FormData(document.getElementById('form-filtros'));
  fd.set('page', CURRENT_PAGE);
  return fd;
}

function carregar() {
  const fd = paramsObj();
  const params = new URLSearchParams();
  for (const [k, v] of fd.entries()) {
    if (v !== '') params.append(k, v);
  }
  document.getElementById('btn-export').href = '/inventario/movimentacoes/export.xlsx?' + params;
  fetch('/inventario/movimentacoes/api?' + params)
    .then(r => r.json())
    .then(data => {
      document.getElementById('resumo').innerHTML =
        `Total: <strong>${data.total}</strong> | Página ${data.page} | Tamanho: ${data.page_size} | Duração: ${data.duracao_ms || 0}ms`;
      let html = '<table class="table table-sm table-hover"><thead><tr>' +
        '<th>Data</th><th>Empr.</th><th>Cod</th><th>Produto</th><th>Lote</th>' +
        '<th class="text-end">Qtd</th><th>Origem</th><th>Destino</th><th>Usuário</th></tr></thead><tbody>';
      for (const r of (data.rows || [])) {
        html += `<tr><td>${r.data || ''}</td><td>${r.empresa || ''}</td>` +
          `<td><strong>${r.cod || ''}</strong></td><td>${r.produto || ''}</td>` +
          `<td>${r.lote || ''}</td>` +
          `<td class="text-end">${Number(r.qtd || 0).toLocaleString('pt-BR',{minimumFractionDigits:3})}</td>` +
          `<td>${r.origem || ''}</td><td>${r.destino || ''}</td>` +
          `<td>${r.usuario || ''}</td></tr>`;
      }
      html += '</tbody></table>';
      document.getElementById('tabela').innerHTML = html;
      // paginador
      const totalPages = Math.ceil((data.total || 0) / (data.page_size || 100));
      const pag = document.getElementById('paginador');
      pag.innerHTML = '';
      if (data.page > 1) {
        const btn = document.createElement('button');
        btn.className = 'btn btn-sm btn-outline-secondary';
        btn.textContent = '< Anterior';
        btn.onclick = () => { CURRENT_PAGE--; carregar(); };
        pag.appendChild(btn);
      }
      if (data.page < totalPages) {
        const btn = document.createElement('button');
        btn.className = 'btn btn-sm btn-outline-secondary';
        btn.textContent = 'Próximo >';
        btn.onclick = () => { CURRENT_PAGE++; carregar(); };
        pag.appendChild(btn);
      }
      const span = document.createElement('span');
      span.className = 'ms-2 small text-muted';
      span.textContent = `Página ${data.page} de ${totalPages || 1}`;
      pag.appendChild(span);
    });
}
document.getElementById('form-filtros').addEventListener('submit', (e) => {
  e.preventDefault();
  CURRENT_PAGE = 1;
  carregar();
});
carregar();
</script>
</div>
{% endblock %}
