{% extends "base.html" %}

{% block title %}Acesso negado{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-6 text-center">
      <div class="mb-3">
        <i class="fas fa-lock fa-4x text-danger"></i>
      </div>
      <h1 class="h3 mb-2">403 &mdash; Acesso negado</h1>
      <p class="text-muted mb-4">
        Voce nao tem permissao para acessar esta area. Caso precise de acesso,
        fale com o administrador do sistema.
      </p>
      <div class="d-flex gap-2 justify-content-center">
        <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary">
          <i class="fas fa-home"></i> Ir para o inicio
        </a>
        <a href="javascript:history.back()" class="btn btn-outline-secondary">
          <i class="fas fa-arrow-left"></i> Voltar
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
