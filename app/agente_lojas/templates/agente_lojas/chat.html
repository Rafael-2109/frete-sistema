{% extends "base.html" %}

{% block title %}Agente Lojas HORA{% endblock %}

{% block extra_css %}
<style>
  .lojas-chat-log { min-height: 280px; max-height: 65vh; overflow-y: auto; }
  .lojas-msg { padding: .5rem .75rem; border-radius: .375rem; margin-bottom: .5rem; }
  .lojas-msg-user { background: var(--bs-primary-bg-subtle); }
  .lojas-msg-agent { background: var(--bs-light); border: 1px solid var(--bs-border-color); }
  .lojas-msg-agent .lojas-md { line-height: 1.5; }
  .lojas-msg-agent .lojas-md p:last-child { margin-bottom: 0; }
  .lojas-msg-agent .lojas-md table { width: auto; border-collapse: collapse; margin: .5rem 0; font-size: .9rem; }
  .lojas-msg-agent .lojas-md th, .lojas-msg-agent .lojas-md td { border: 1px solid var(--bs-border-color); padding: .25rem .5rem; }
  .lojas-msg-agent .lojas-md code { background: var(--bs-tertiary-bg); padding: .1rem .3rem; border-radius: .2rem; font-size: .85em; }
  .lojas-msg-agent .lojas-md pre { background: var(--bs-tertiary-bg); padding: .5rem; border-radius: .25rem; overflow-x: auto; font-size: .85em; }
  .lojas-tool-call { font-size: .85rem; color: var(--bs-info-text-emphasis); font-style: italic; }
  .lojas-tool-result-toggle { font-size: .8rem; color: var(--bs-secondary); cursor: pointer; }
  .lojas-tool-result-body { background: var(--bs-tertiary-bg); padding: .5rem; border-radius: .25rem; font-family: monospace; font-size: .8rem; white-space: pre-wrap; max-height: 240px; overflow-y: auto; }
  .lojas-thinking { font-size: .85rem; color: var(--bs-secondary); font-style: italic; }
  .lojas-error { background: var(--bs-danger-bg-subtle); color: var(--bs-danger-text-emphasis); padding: .5rem; border-radius: .25rem; }
  .lojas-todos { font-size: .85rem; padding: .5rem .75rem; background: var(--bs-info-bg-subtle); border-radius: .25rem; margin-bottom: .5rem; }
  .lojas-todos ul { margin: 0; padding-left: 1.25rem; list-style: none; }
  .lojas-todos li { padding: .15rem 0; }
  .lojas-todos .ti { display: inline-block; width: 1.2em; }
  .lojas-todos .completed { color: var(--bs-success); text-decoration: line-through; opacity: .8; }
  .lojas-todos .in_progress { color: var(--bs-warning-text-emphasis); font-weight: 600; }
  .lojas-todos .pending { color: var(--bs-secondary); }
</style>
<!-- Markdown rendering: marked + DOMPurify (CDN, mesmo padrao do agente Nacom) -->
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js" defer></script>
{% endblock %}

{% block content %}
<div class="container my-3">
  <div class="d-flex align-items-center mb-3 flex-wrap gap-2">
    <h4 class="mb-0 me-2">
      <i class="fas fa-motorcycle text-primary"></i>
      Agente Lojas HORA
    </h4>
    <span class="badge bg-success">M2 SDK</span>
    <div class="ms-auto d-flex align-items-center gap-2">
      <label for="session-picker" class="form-label small mb-0 text-secondary">
        Sessao:
      </label>
      <select id="session-picker" class="form-select form-select-sm" style="min-width: 220px;">
        <option value="">Nova sessao</option>
      </select>
      <button type="button" id="new-session-btn" class="btn btn-sm btn-outline-secondary" title="Nova sessao">
        <i class="fas fa-plus"></i>
      </button>
    </div>
  </div>

  <div class="card mb-3">
    <div class="card-header bg-light py-2">
      <strong>Contexto da sua loja</strong>
    </div>
    <div class="card-body py-2">
      <pre class="mb-0" style="font-size: 0.85rem;">{{ loja_context_preview }}</pre>
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      <div id="chat-log" class="lojas-chat-log mb-3"></div>
      <form id="chat-form" class="d-flex gap-2">
        <input
          type="text"
          id="chat-input"
          class="form-control"
          placeholder="Digite sua mensagem para o Agente Lojas..."
          autocomplete="off"
          required
        />
        <button type="submit" class="btn btn-primary" id="chat-send">
          <i class="fas fa-paper-plane"></i> Enviar
        </button>
      </form>
    </div>
  </div>
</div>

<!-- Modal AskUserQuestion -->
<div class="modal fade" id="askUserModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">
          <i class="fas fa-question-circle text-primary"></i>
          O agente precisa confirmar
        </h5>
      </div>
      <div class="modal-body" id="askUserBody"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-primary" id="askUserSubmit">Enviar respostas</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function () {
  const form = document.getElementById('chat-form');
  const input = document.getElementById('chat-input');
  const sendBtn = document.getElementById('chat-send');
  const log = document.getElementById('chat-log');
  const sessionPicker = document.getElementById('session-picker');
  const newSessionBtn = document.getElementById('new-session-btn');
  // CSRF: CSRFProtect e global (app/__init__.py) e as rotas /agente-lojas/api/*
  // NAO estao isentas. Token vem do <meta name="csrf-token"> de base.html.
  const csrfToken = (document.querySelector('meta[name="csrf-token"]') || {}).content || '';
  let sessionId = (crypto && crypto.randomUUID) ? crypto.randomUUID() : String(Date.now());

  // Histórico de sessões — popula dropdown com /api/sessions GET (filtered
  // por agente='lojas' no backend). Click muda sessionId; nao carrega
  // mensagens anteriores (operador continua dali — agente recupera contexto
  // via PostgresSessionStore se ativo, ou JSONL local).
  function fmtTimestamp(iso) {
    if (!iso) return '';
    try {
      const d = new Date(iso);
      const now = new Date();
      const sameDay = d.toDateString() === now.toDateString();
      if (sameDay) {
        return d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
      }
      return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
    } catch { return ''; }
  }

  async function loadSessionHistory() {
    try {
      const resp = await fetch('/agente-lojas/api/sessions?limit=20');
      if (!resp.ok) return;
      const data = await resp.json();
      if (!data.success || !Array.isArray(data.sessions)) return;
      // Manter "Nova sessao" como primeiro option, recriar os demais
      sessionPicker.innerHTML = '<option value="">Nova sessao</option>';
      data.sessions.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.session_id;
        const label = (s.last_message || '').slice(0, 40) || '(sem mensagens)';
        const ts = fmtTimestamp(s.updated_at || s.created_at);
        opt.textContent = `${ts} — ${label}`;
        sessionPicker.appendChild(opt);
      });
    } catch (e) {
      console.warn('[LOJAS] Falha ao carregar historico:', e);
    }
  }

  sessionPicker.addEventListener('change', () => {
    const newId = sessionPicker.value;
    if (newId === sessionId) return;
    if (newId) {
      sessionId = newId;
      log.innerHTML = '';  // limpa mensagens da sessao anterior
      const note = document.createElement('div');
      note.className = 'small text-secondary text-center my-2';
      note.textContent = `Sessao retomada (${newId.slice(0, 8)}...)`;
      log.appendChild(note);
    } else {
      // "Nova sessao" selecionada
      sessionId = (crypto && crypto.randomUUID) ? crypto.randomUUID() : String(Date.now());
      log.innerHTML = '';
    }
  });

  newSessionBtn.addEventListener('click', () => {
    sessionId = (crypto && crypto.randomUUID) ? crypto.randomUUID() : String(Date.now());
    sessionPicker.value = '';
    log.innerHTML = '';
    input.focus();
  });

  // Carrega historico no load — defer para nao bloquear render
  if (document.readyState !== 'loading') loadSessionHistory();
  else window.addEventListener('DOMContentLoaded', loadSessionHistory);

  // Modal AskUserQuestion
  const askModalEl = document.getElementById('askUserModal');
  const askModal = new bootstrap.Modal(askModalEl);
  const askBody = document.getElementById('askUserBody');
  const askSubmit = document.getElementById('askUserSubmit');
  let askPendingSessionId = null;
  let askPendingQuestions = [];

  // Configura marked quando lib carregar (defer)
  function configureMarked() {
    if (typeof marked !== 'undefined' && typeof marked.setOptions === 'function') {
      try { marked.setOptions({ breaks: true, gfm: true }); } catch {}
    }
  }
  if (document.readyState !== 'loading') configureMarked();
  else window.addEventListener('DOMContentLoaded', configureMarked);

  // Renderiza markdown com sanitizacao XSS via DOMPurify.
  // Fallback: textContent (escapa tudo) se libs nao carregaram.
  function renderMarkdown(text) {
    if (typeof marked === 'undefined' || typeof DOMPurify === 'undefined') {
      return null;  // sinaliza fallback para textContent
    }
    try {
      const rawHtml = marked.parse(text || '');
      return DOMPurify.sanitize(rawHtml, {
        // Manter classes basicas; bloquear iframes/objects/etc.
        FORBID_TAGS: ['iframe', 'object', 'embed', 'script', 'style'],
        FORBID_ATTR: ['onerror', 'onclick', 'onload'],
      });
    } catch (e) {
      console.warn('[LOJAS] Markdown render falhou:', e);
      return null;
    }
  }

  function appendBubble(role, text) {
    const div = document.createElement('div');
    div.className = `lojas-msg lojas-msg-${role}`;
    const tag = role === 'user' ? 'strong' : 'span';
    const labelEl = document.createElement(tag);
    labelEl.textContent = role === 'user' ? 'Voce: ' : 'Agente: ';
    const textEl = document.createElement('span');
    textEl.className = role === 'agent' ? 'text-body lojas-md' : 'text-body';
    if (role === 'agent') {
      // Buffer de texto bruto para re-render incremental no streaming.
      textEl.dataset.rawText = text || '';
      const html = renderMarkdown(text || '');
      if (html !== null) {
        textEl.innerHTML = html;
      } else {
        textEl.textContent = text || '';
      }
    } else {
      textEl.textContent = text;
    }
    div.appendChild(labelEl);
    div.appendChild(textEl);
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
    return textEl;
  }

  // Streaming markdown — re-renderiza o buffer acumulado a cada chunk.
  function appendChunkToAgent(textEl, chunk) {
    const newRaw = (textEl.dataset.rawText || '') + (chunk || '');
    textEl.dataset.rawText = newRaw;
    const html = renderMarkdown(newRaw);
    if (html !== null) {
      textEl.innerHTML = html;
    } else {
      textEl.textContent = newRaw;
    }
  }

  // Task progress — renderiza/atualiza lista in-place.
  // Mantem 1 unico container por turno + Map por task_id para acumulacao incremental.
  // SDK 0.2.82+: TodoWrite substituido por TaskCreate/TaskUpdate/TaskList. Eventos:
  //   - created: nova task (adiciona ao Map)
  //   - updated: task existente (mescla por task_id)
  //   - snapshot: TaskList completo (substitui Map)
  // Formato canonical: {task_id, status, subject}. Formato antigo TodoWrite
  // ({content, activeForm}) e normalizado em appendTodos para back-compat.
  let todosEl = null;
  let currentTasks = new Map();  // task_id -> {task_id, status, subject}

  function _renderTasks() {
    if (currentTasks.size === 0) return;
    if (!todosEl || !todosEl.isConnected) {
      todosEl = document.createElement('div');
      todosEl.className = 'lojas-todos';
      log.appendChild(todosEl);
    }
    const ul = document.createElement('ul');
    // Ordenar por task_id numerico (CLI gera autoincremento)
    const sorted = Array.from(currentTasks.values()).sort((a, b) => {
      const an = parseInt(a.task_id, 10) || 0;
      const bn = parseInt(b.task_id, 10) || 0;
      return an - bn;
    });
    sorted.forEach(t => {
      const li = document.createElement('li');
      const status = (t.status || 'pending').toLowerCase();
      const icon = status === 'completed' ? '✓' : status === 'in_progress' ? '▶' : '○';
      const ti = document.createElement('span');
      ti.className = 'ti';
      ti.textContent = icon;
      const txt = document.createElement('span');
      txt.className = status;
      txt.textContent = t.subject || t.content || t.activeForm || '';
      li.appendChild(ti);
      li.appendChild(txt);
      ul.appendChild(li);
    });
    todosEl.innerHTML = '';
    todosEl.appendChild(ul);
    log.scrollTop = log.scrollHeight;
  }

  function appendTaskEvent(meta) {
    if (!meta || !meta.action) return;
    if (meta.action === 'snapshot' && Array.isArray(meta.tasks)) {
      currentTasks.clear();
      meta.tasks.forEach(t => {
        if (t && t.task_id) currentTasks.set(String(t.task_id), { ...t, task_id: String(t.task_id) });
      });
      _renderTasks();
    } else if (meta.action === 'created' && meta.task_id) {
      const tid = String(meta.task_id);
      const existing = currentTasks.get(tid) || {};
      currentTasks.set(tid, {
        ...existing,
        task_id: tid,
        status: meta.status || existing.status || 'pending',
        subject: meta.subject || existing.subject || '',
      });
      _renderTasks();
    } else if (meta.action === 'updated' && meta.task_id) {
      const tid = String(meta.task_id);
      const existing = currentTasks.get(tid);
      if (existing) {
        const patch = {};
        if (meta.status !== undefined) patch.status = meta.status;
        if (meta.subject !== undefined) patch.subject = meta.subject;
        currentTasks.set(tid, { ...existing, ...patch });
        _renderTasks();
      }
      // Se task_id desconhecido, ignora — snapshot proximo resincroniza
    }
  }

  // Back-compat: TodoWrite (SDK <= 0.1.81) emitia evento 'todos' com array {status, content}.
  // Mantemos appendTodos para nao quebrar caso algum cliente velho ainda emita.
  function appendTodos(todos) {
    if (!Array.isArray(todos) || todos.length === 0) return;
    currentTasks.clear();
    todos.forEach((t, i) => {
      const tid = String(t.task_id || (i + 1));
      currentTasks.set(tid, {
        task_id: tid,
        status: t.status || 'pending',
        subject: t.content || t.activeForm || '',
      });
    });
    _renderTasks();
  }
  function resetTodos() { todosEl = null; currentTasks.clear(); }

  function appendInfo(html, klass) {
    const div = document.createElement('div');
    div.className = klass || '';
    div.innerHTML = html;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
    return div;
  }

  function appendToolCall(toolName, toolInput) {
    const summary = toolName === 'Skill'
      ? `invocando skill <code>${(toolInput && toolInput.skill) || ''}</code>...`
      : (toolName === 'Bash'
        ? `executando: <code>${(toolInput && (toolInput.description || toolInput.command || '')).slice(0, 80)}</code>`
        : `chamando <code>${toolName}</code>...`);
    return appendInfo(`<i class="fas fa-cog fa-spin"></i> ${summary}`, 'lojas-tool-call');
  }

  function appendToolResult(content, isError) {
    const wrap = document.createElement('div');
    const toggle = document.createElement('div');
    toggle.className = 'lojas-tool-result-toggle';
    toggle.innerHTML = isError
      ? `<i class="fas fa-times-circle text-danger"></i> resultado (erro) <span class="text-decoration-underline">mostrar</span>`
      : `<i class="fas fa-check-circle text-success"></i> resultado <span class="text-decoration-underline">mostrar</span>`;
    const body = document.createElement('div');
    body.className = 'lojas-tool-result-body d-none';
    body.textContent = (content || '').slice(0, 4000);
    toggle.addEventListener('click', () => {
      body.classList.toggle('d-none');
      const span = toggle.querySelector('span');
      if (span) span.textContent = body.classList.contains('d-none') ? 'mostrar' : 'ocultar';
    });
    wrap.appendChild(toggle);
    wrap.appendChild(body);
    log.appendChild(wrap);
    log.scrollTop = log.scrollHeight;
  }

  function appendThinking(text) {
    if (!text) return;
    appendInfo(`<i class="fas fa-brain"></i> ${text}`, 'lojas-thinking');
  }

  function appendError(content) {
    appendInfo(`<i class="fas fa-exclamation-triangle"></i> ${content}`, 'lojas-error');
  }

  function showAskUserQuestion(payload) {
    askPendingSessionId = payload.session_id;
    askPendingQuestions = payload.questions || [];
    // Fix code-reviewer (2026-05-09): desabilita form principal enquanto
    // modal aberta. Sem isso, usuario pode submeter nova mensagem (criando
    // segundo stream concorrente) ou ficar com UI travada se stream encerrar
    // por timeout enquanto modal aguarda resposta.
    input.disabled = true;
    sendBtn.disabled = true;
    askSubmit.disabled = false;
    askBody.innerHTML = '';
    askPendingQuestions.forEach((q, idx) => {
      const block = document.createElement('div');
      block.className = 'mb-3';
      const lbl = document.createElement('div');
      lbl.className = 'fw-bold mb-2';
      lbl.textContent = q.question;
      block.appendChild(lbl);
      const opts = q.options || [];
      const radioName = `ask_q_${idx}`;
      opts.forEach((opt, oidx) => {
        const id = `${radioName}_${oidx}`;
        const wrap = document.createElement('div');
        wrap.className = 'form-check';
        const inputEl = document.createElement('input');
        inputEl.className = 'form-check-input';
        inputEl.type = q.multiSelect ? 'checkbox' : 'radio';
        inputEl.name = radioName;
        inputEl.id = id;
        inputEl.value = opt.label;
        if (oidx === 0 && !q.multiSelect) inputEl.checked = true;
        const lblEl = document.createElement('label');
        lblEl.className = 'form-check-label';
        lblEl.htmlFor = id;
        lblEl.innerHTML = `<strong>${opt.label}</strong>` + (opt.description ? ` — <span class="text-secondary small">${opt.description}</span>` : '');
        wrap.appendChild(inputEl);
        wrap.appendChild(lblEl);
        block.appendChild(wrap);
      });
      askBody.appendChild(block);
    });
    askModal.show();
  }

  askSubmit.addEventListener('click', async function () {
    const answers = {};
    askPendingQuestions.forEach((q, idx) => {
      const radioName = `ask_q_${idx}`;
      const checked = askBody.querySelectorAll(`input[name="${radioName}"]:checked`);
      if (checked.length === 0) return;
      const vals = Array.from(checked).map(el => el.value);
      answers[q.question] = q.multiSelect ? vals.join(', ') : vals[0];
    });

    askSubmit.disabled = true;
    try {
      const resp = await fetch('/agente-lojas/api/user-answer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
        body: JSON.stringify({ session_id: askPendingSessionId, answers }),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        appendError('Falha ao enviar resposta: ' + (err.error || resp.statusText));
      }
    } catch (e) {
      appendError('Erro de conexao ao enviar resposta: ' + e.message);
    } finally {
      askSubmit.disabled = false;
      askModal.hide();
      // Limpa estado pendente — resposta enviada (ou falhou). Form principal
      // continua disabled ate o stream emitir done/error (que re-enabilita
      // no `finally` do submit handler).
      askPendingSessionId = null;
      askPendingQuestions = [];
    }
  });

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    const message = input.value.trim();
    if (!message) return;

    appendBubble('user', message);
    input.value = '';
    input.disabled = true;
    sendBtn.disabled = true;

    let agentTextEl = null;
    resetTodos();  // Novo turno: TodoWrite renderiza em container fresco

    try {
      const resp = await fetch('/agente-lojas/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
        body: JSON.stringify({ message, session_id: sessionId }),
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ error: resp.statusText }));
        appendError('ERRO: ' + (err.error || resp.statusText));
        return;
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        const parts = buffer.split('\n\n');
        buffer = parts.pop();
        for (const part of parts) {
          const lines = part.split('\n');
          let event = 'message';
          let dataLine = '';
          for (const line of lines) {
            if (line.startsWith('event: ')) event = line.slice(7);
            else if (line.startsWith('data: ')) dataLine = line.slice(6);
          }
          if (!dataLine) continue;
          let payload;
          try { payload = JSON.parse(dataLine); } catch { continue; }

          if (event === 'text') {
            if (!agentTextEl) agentTextEl = appendBubble('agent', '');
            appendChunkToAgent(agentTextEl, payload.content || '');
            log.scrollTop = log.scrollHeight;
          } else if (event === 'thinking') {
            appendThinking(payload.content);
          } else if (event === 'tool_call') {
            appendToolCall(payload.tool_name, payload.tool_input);
          } else if (event === 'tool_result') {
            appendToolResult(payload.content, payload.is_error);
          } else if (event === 'todos') {
            // Back-compat SDK <= 0.1.81 (TodoWrite). SDK 0.2.82+ usa 'task_event'.
            appendTodos(payload.todos);
          } else if (event === 'task_event') {
            // SDK 0.2.82+: TaskCreate/TaskUpdate/TaskList. Metadata carrega
            // {action: created|updated|snapshot, task_id?, subject?, tasks?, status?}.
            appendTaskEvent(payload);
          } else if (event === 'error') {
            appendError(payload.content || 'erro desconhecido');
            // Fix code-reviewer (2026-05-09): se modal AskUserQuestion estava
            // aberto, o stream encerrou antes da resposta — fecha modal e
            // limpa estado para evitar 404 ao tentar submeter resposta orfa.
            if (askPendingSessionId) {
              askPendingSessionId = null;
              askPendingQuestions = [];
              try { askModal.hide(); } catch {}
            }
          } else if (event === 'ask_user_question') {
            showAskUserQuestion(payload);
            // NAO interrompe o stream — agente continua aguardando resposta
            // via POST /api/user-answer (event_queue desbloqueia can_use_tool)
          } else if (event === 'init' || event === 'start' || event === 'heartbeat') {
            // ignora
          } else if (event === 'done') {
            // mantem reset visual; o stream encerra logo depois
            agentTextEl = null;
            // Se modal estava aberto e o stream foi finalizado sem resposta
            // (timeout 55s no can_use_tool ou cancel), fecha modal silenciosamente.
            if (askPendingSessionId) {
              askPendingSessionId = null;
              askPendingQuestions = [];
              try { askModal.hide(); } catch {}
            }
          }
        }
      }

    } catch (err) {
      appendError('ERRO de conexao: ' + err.message);
    } finally {
      input.disabled = false;
      sendBtn.disabled = false;
      input.focus();
      // Refresh dropdown — nova sessao criada ou last_message atualizada.
      // Best-effort: nao bloquear UI se falhar.
      loadSessionHistory().catch(() => {});
    }
  });
})();
</script>
{% endblock %}
