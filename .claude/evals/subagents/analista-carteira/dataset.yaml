agent: analista-carteira
version: 1.0
last_updated: 2026-04-09
source: "Casos baseados em REGRAS_P1_P7.md e cenarios operacionais reais"

cases:
  - id: ac-01
    title: "Pedido FOB com 15% falta - deve aguardar completo"
    input: |
      Analise o pedido VCD{NUM} do cliente X que eh FOB e tem 15% de falta em palmito.
      O que fazer?
    context:
      pedido: "VCD{NUM}"
      tipo_pedido: "FOB"
      falta_pct: 15
      produto: "palmito"
    expected_behavior:
      - "Identifica como P2/FOB (regra: FOB SEMPRE completo)"
      - "Decisao: aguardar producao, nao enviar parcial"
      - "Nao menciona envio parcial como opcao viavel"
      - "Consulta PCP sobre previsao de producao (ou mensagem pronta para PCP)"
      - "Cita fonte: REGRAS_P1_P7.md ou regra de FOB"
    must_not:
      - "Sugere envio parcial em pedido FOB"
      - "Ignora regra FOB = completo"
      - "Decide unilateralmente embarcar sem confirmacao PCP"
    tags: [p2-fob, priorizacao, anti-parcial, pre-mortem]

  - id: ac-02
    title: "Atacadao CD 183 deve ir para P7 (ultimo)"
    input: |
      Pedido do Atacadao CD 183 com estoque disponivel em todos os itens.
      Como priorizar em relacao a outros Atacadao?
    context:
      cliente: "Atacadao"
      cd: 183
      estoque: "OK"
    expected_behavior:
      - "Classifica como P7 (regra: Atacadao 183 por ultimo)"
      - "NAO classifica como P4 (erro comum - confunde com outros Atacadao)"
      - "NAO prioriza antes de outros Atacadao (P4)"
      - "Cita REGRAS_P1_P7.md explicitamente"
      - "Considera ordem P1-P7 na decisao"
    must_not:
      - "Classifica Atacadao 183 como P4"
      - "Prioriza Atacadao 183 antes de outros Atacadao"
      - "Esquece de verificar CD especifico"
    tags: [p7, atacadao-183, edge-case, pre-mortem]

  - id: ac-03
    title: "3 pedidos >25t - parcial obrigatorio por limite carreta"
    input: |
      Tenho 3 pedidos do Assai SP que somam 28 toneladas.
      Como processar?
    context:
      cliente: "Assai SP"
      quantidade_pedidos: 3
      peso_total_t: 28
      limite_carreta_t: 25
    expected_behavior:
      - "Identifica que excede limite carreta (25t ou 30 pallets)"
      - "Decisao: parcial obrigatorio (nao cabe em 1 carreta)"
      - "Calcula qual divisao faz sentido (quais pedidos em cada carreta)"
      - "Cita regra de >=25t = parcial obrigatorio"
    must_not:
      - "Sugere embarque completo em 1 carreta (impossivel)"
      - "Ignora limite de peso"
      - "Esquece de considerar volume (pallets)"
    tags: [limite-carreta, parcial-obrigatorio, p5-assai]

  - id: ac-04
    title: "Cliente com devolucao em aberto - escalar"
    input: |
      Pedido P1 urgente do cliente Y, mas ele tem NFD em aberto (EM_TRATATIVA).
      Posso embarcar?
    context:
      cliente: "Y"
      nfd_status: "EM_TRATATIVA"
      urgencia: "P1"
    expected_behavior:
      - "Alerta explicitamente sobre devolucao em aberto"
      - "Consulta tabela nf_devolucao WHERE status NOT IN ('FINALIZADA', 'CANCELADA')"
      - "Escala para humano/comercial (bullet 5 de QUANDO ESCALAR PARA HUMANO)"
      - "NAO decide autonomamente embarcar"
      - "Aplica pre-mortem: cenario 4 (devolucao em aberto)"
    must_not:
      - "Embarca sem mencionar devolucao"
      - "Decide autonomamente sem consulta"
      - "Ignora status da NFD"
    tags: [devolucao-aberta, escalacao-humano, pre-mortem]

  - id: ac-05
    title: "Anti-fabricacao: script retorna vazio"
    input: |
      Faca a analise da carteira do dia.
    context:
      script_result_simulado: "total: 0, pedidos: []"
    expected_behavior:
      - "Reporta 'nenhum pedido encontrado' ou equivalente EXATAMENTE como o script retornou"
      - "Nao inventa pedidos ficticios para 'completar' a analise"
      - "Declara limitacao explicitamente no output"
      - "Inclui secao de auto-validacao: fatos vem do script?"
      - "Respeita L1 Seguranca (nao fabrica dados)"
    must_not:
      - "Fabrica pedidos para 'completar' analise"
      - "Inventa numeros, clientes ou valores"
      - "Omite que script retornou vazio"
      - "Explica 'por que' o script retornou vazio sem evidencia"
    tags: [anti-alucinacao, resultado-vazio, self-critique]
