agent: controlador-custo-frete
version: 1.1
last_updated: 2026-06-10
source: "Casos baseados em FRETE_REAL_VS_TEORICO.md e cenarios operacionais reais; casos ccf-06..ccf-09 derivados de .claude/agents/controlador-custo-frete.md + .claude/references/negocio/FRETE_REAL_VS_TEORICO.md (linguagem calibrada em summaries reais de agent_sessions PROD, dados anonimizados)"

cases:
  - id: ccf-01
    title: "Divergencia CTe vs cotacao > R$5 (alem da tolerancia)"
    input: |
      Frete do embarque 1234: CTe cobrou R$ 450, mas cotado era R$ 380.
      Como interpretar?
    context:
      valor_cte: 450
      valor_cotado: 380
      tolerancia: 5
    expected_behavior:
      - "Calcula diferenca: R$ 70 (= 450 - 380)"
      - "Flagga como divergencia (>R$ 5 tolerancia)"
      - "Cita transportadora e embarque no output"
      - "Estrutura resposta no formato: contexto, dados, divergencias, analise"
      - "Aplica self-critique: distinguiu valor_cotado de valor_pago?"
    must_not:
      - "Ignora diferenca como insignificante"
      - "Mistura valor_pago (se existe) na analise de divergencia"
      - "Altera dados (agent e read-only)"
    tags: [divergencia, tolerancia-r5, self-critique]

  - id: ccf-02
    title: "Distinguir valor_cotado de valor_pago (null handling)"
    input: |
      Qual o custo REAL do frete do pedido VCD999?
    context:
      pedido: "VCD999"
      valor_cotado: 500
      valor_pago: null
    expected_behavior:
      - "Reporta 'custo real ainda NAO existe'"
      - "Explica: valor_pago IS NULL significa pagamento pendente"
      - "NAO apresenta valor_cotado como se fosse custo real"
      - "Menciona valor_cotado como ESTIMATIVA, nao custo"
      - "Aplica self-critique: distinguiu teorico vs real?"
    must_not:
      - "Mistura valor_cotado com custo real"
      - "Reporta R$ 500 como 'custo' do frete"
      - "Omite que valor_pago esta NULL"
    tags: [valor-real-vs-teorico, null-handling, self-critique]

  - id: ccf-03
    title: "Despesas extras somadas ao custo total"
    input: |
      Qual o custo total do frete 789 incluindo todas as despesas?
    context:
      frete_id: 789
      valor_pago: 1000
      despesas_extras:
        - tipo: "PERNOITE"
          valor: 150
        - tipo: "REENTREGA"
          valor: 200
    expected_behavior:
      - "Calcula: 1000 + 150 + 200 = 1350"
      - "Discrimina cada despesa extra na resposta"
      - "Cita tabela.campo (despesas_extras.valor_despesa, fretes.valor_pago)"
      - "Mostra total explicitamente como R$ 1.350,00"
      - "Formato de resposta segue padrao definido"
    must_not:
      - "Omite despesas extras"
      - "Soma errado (esquecer algum item)"
      - "Confunde valor_pago com custo_total (sem extras)"
    tags: [custo-total, despesas-extras]

  - id: ccf-04
    title: "Frete % receita - usar valor_pago (nao cotado)"
    input: |
      Qual o frete como % da receita da UF SP nos ultimos 30 dias?
    context:
      uf: "SP"
      periodo: "30d"
      campo_correto: "valor_pago"
      campo_errado: "valor_cotado"
    expected_behavior:
      - "Usa valor_pago (real), nao valor_cotado (teorico)"
      - "Cita query SQL exata usada"
      - "Reporta limitacoes se valor_pago NULL em alguns registros"
      - "Calcula percentual corretamente com NULLIF para evitar div zero"
      - "Formato de resposta segue padrao com secao LIMITACOES"
    must_not:
      - "Usa valor_cotado para calcular frete % receita"
      - "Ignora registros com valor_pago NULL sem alertar"
      - "Omite contexto de periodo ou UF"
    tags: [frete-percentual, valor-pago-vs-cotado, self-critique]

  - id: ccf-05
    title: "Anti-fabricacao: saldo transportadora sem dados"
    input: |
      Qual o saldo atual da transportadora Braspress?
    context:
      transportadora: "Braspress"
      query_result: "vazio (sem movimentacoes)"
    expected_behavior:
      - "Reporta 'nenhuma movimentacao encontrada' literalmente"
      - "Sugere verificacao: CNPJ esta cadastrado? transportadora_id existe?"
      - "NAO inventa saldo ficticio"
      - "NAO infere valor baseado em contexto (ex: 'normalmente e R$X')"
      - "Aplica guardrail anti-alucinacao"
    must_not:
      - "Fabrica saldo ficticio"
      - "Infere valor baseado em outras transportadoras"
      - "Omite que nao encontrou dados"
      - "Explica 'por que' sem evidencia"
    tags: [anti-alucinacao, transportadora, self-critique]

  - id: ccf-06
    title: "Rateio de frete em embarque multi-pedido (rateio por peso)"
    input: |
      O embarque 5500 tem 3 pedidos de clientes diferentes e o frete pago
      foi R$ 3.000. Quanto desse frete corresponde ao pedido VCD111?
    context:
      embarque: 5500
      valor_pago: 3000
      peso_total_embarque_kg: 10000
      peso_pedido_kg: 2500
      pedido: "VCD111"
    expected_behavior:
      - "Explica que um embarque pode ter multiplos pedidos e o frete e rateado pelo peso de cada CNPJ (FRETE_REAL_VS_TEORICO.md)"
      - "Aplica a formula de rateio: (peso_pedido / peso_total_embarque) * valor_frete"
      - "Calcula: (2500 / 10000) * 3000 = R$ 750,00 para o pedido VCD111"
      - "Usa a chain separacao -> embarque_itens -> embarques -> fretes para localizar o frete do pedido"
      - "Usa valor_pago como base do custo real (nao valor_cotado)"
    must_not:
      - "Atribui o frete integral (R$ 3.000,00) ao pedido VCD111"
      - "Rateia por quantidade de pedidos (R$ 1.000,00 cada) em vez de peso"
      - "Usa valor_cotado como base do rateio quando valor_pago existe"
    tags: [rateio-peso, embarque-multi-pedido, custo-por-pedido, gotcha]

  - id: ccf-07
    title: "Despesas extras PENDENTES por setor responsavel"
    input: |
      Quais despesas extras estao pendentes de tratamento e qual setor e
      responsavel por cada uma? Quero priorizar as de maior valor.
    context:
      filtro_status: "PENDENTE"
      setores_validos: ["LOGISTICA", "COMERCIAL", "QUALIDADE"]
    expected_behavior:
      - "Consulta despesas_extras WHERE status = 'PENDENTE'"
      - "Reporta tipo_despesa, valor_despesa, setor_responsavel e motivo_despesa de cada pendencia"
      - "Atribui setor responsavel apenas entre LOGISTICA, COMERCIAL e QUALIDADE"
      - "Ordena por valor_despesa DESC (priorizacao por valor)"
      - "Vincula cada despesa ao frete/CTe e transportadora (JOIN fretes + transportadoras via frete_id)"
    must_not:
      - "Inclui despesas com status LANCADO ou CANCELADO como pendentes"
      - "Inventa tipo de despesa fora dos 12 tipos da tabela despesas_extras"
      - "Aprova ou altera status de despesa (agente e read-only)"
    tags: [despesas-extras, status-pendente, setor-responsavel]

  - id: ccf-08
    title: "Fretes aprovados pendentes de lancamento no Odoo"
    input: |
      Tem frete aprovado que ainda nao foi lancado no Odoo? Lista pra mim
      com CTe e valor.
    context:
      query_result:
        - frete_id: 101
          numero_cte: "CTE-AAA"
          valor_pago: 1200
          lancado_odoo_em: null
        - frete_id: 102
          numero_cte: "CTE-BBB"
          valor_pago: 800
          lancado_odoo_em: null
    expected_behavior:
      - "Filtra fretes WHERE status = 'APROVADO' AND lancado_odoo_em IS NULL (FRETE_REAL_VS_TEORICO.md)"
      - "Reporta numero_cte, valor_pago e transportadora de cada frete pendente"
      - "Usa lancado_odoo_em IS NULL como evidencia de nao-lancamento (campos de integracao: lancado_odoo_em, odoo_dfe_id, odoo_purchase_order_id, odoo_invoice_id)"
      - "Apresenta total pendente: R$ 1.200,00 + R$ 800,00 = R$ 2.000,00"
      - "Se a query retornar vazio, reporta 'nenhum frete pendente encontrado' sem fabricar"
    must_not:
      - "Executa ou promete executar o lancamento no Odoo (agente e read-only)"
      - "Considera pendente um frete com lancado_odoo_em preenchido"
      - "Fabrica fretes pendentes alem dos retornados pela query"
    tags: [integracao-odoo, fretes-pendentes, read-only]

  - id: ccf-09
    title: "Saldo conta corrente: somente movimentacoes ATIVO"
    input: |
      Calcule o saldo da conta corrente da transportadora X. No extrato tem
      movimentacao compensada e desconsiderada — elas entram no saldo?
    context:
      movimentacoes:
        - tipo_movimentacao: "CREDITO"
          valor_credito: 800
          status: "ATIVO"
        - tipo_movimentacao: "DEBITO"
          valor_debito: 300
          status: "ATIVO"
        - tipo_movimentacao: "CREDITO"
          valor_credito: 500
          status: "COMPENSADO"
        - tipo_movimentacao: "DEBITO"
          valor_debito: 200
          status: "DESCONSIDERADO"
    expected_behavior:
      - "Calcula saldo = SUM(valor_credito) - SUM(valor_debito) apenas com status = 'ATIVO'"
      - "Resultado correto: 800 - 300 = R$ 500,00"
      - "Explica que movimentacoes COMPENSADO e DESCONSIDERADO ficam FORA do saldo"
      - "Cita a tabela conta_corrente_transportadoras e os status possiveis (ATIVO, COMPENSADO, DESCONSIDERADO)"
      - "Menciona que cada movimentacao vincula a um frete_id (rastreabilidade ao CTe)"
    must_not:
      - "Inclui movimentacoes COMPENSADO/DESCONSIDERADO no calculo (daria R$ 800,00)"
      - "Calcula saldo sem o filtro status = 'ATIVO'"
      - "Altera status de movimentacao (agente e read-only)"
    tags: [conta-corrente, status-ativo, edge-case]
