services:
  - type: web
    name: sistema-fretes
    env: python
    plan: starter
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: ./start_render.sh
    # Caddy abre 0.0.0.0:10000 ANTES dos gunicorns ficarem prontos (start_render.sh
    # secao 6). Sem health check, o Render marcaria o deploy live assim que a porta
    # abre e cortaria o trafego do container antigo cedo demais -> janela de 502.
    # healthCheckPath /auth/login (Caddy -> gunicorn-sistema:5002, 200 sem auth)
    # so deixa o deploy virar live quando o sistema responde -> zero-downtime real.
    healthCheckPath: /auth/login
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: WEB_CONCURRENCY
        value: 1
    autoDeploy: true

  # Configuração adicional de banco se necessário
  databases:
    - name: sistema-fretes-db
      plan: starter

# NOTE 2026-05-12: Builds de artifacts (skill gerando-artifact) reusam o worker
# existente (sistema-fretes-worker-render). A fila 'artifacts' tem prioridade
# media-alta (logo apos hora_nfe). Node.js 18+ instalado via NVM no
# start_worker_render.sh.
